<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pseudo-Haptic GIF Cinemagraph - Coffee Steam</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: none;
  }
  #gif-bg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
    pointer-events: none;
  }
  #main-canvas {
    position: fixed;
    top: 0; left: 0;
    display: block;
    z-index: 1;
    cursor: none;
  }
  #custom-cursor {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    width: 16px;
    height: 24px;
    transition: none;
  }
  #cursor-arrow { position: absolute; top: 0; left: 0; }
  #controls {
    position: fixed;
    top: 12px;
    right: 12px;
    background: rgba(20, 20, 40, 0.92);
    border: 1px solid #444;
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 13px;
    line-height: 1.7;
    max-width: 310px;
    z-index: 500;
  }
  #controls h3 {
    font-size: 14px;
    margin-bottom: 8px;
    color: #ffcc66;
    border-bottom: 1px solid #444;
    padding-bottom: 4px;
  }
  #controls label {
    display: flex; align-items: center; gap: 8px; margin: 6px 0;
  }
  #controls input[type="range"] { width: 120px; accent-color: #ffcc66; }
  #controls .val { color: #ffcc66; min-width: 32px; text-align: right; }
  .info-badge {
    position: fixed;
    bottom: 12px;
    left: 12px;
    background: rgba(20, 20, 40, 0.88);
    border: 1px solid #444;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 12px;
    line-height: 1.6;
    z-index: 500;
    max-width: 420px;
  }
  .info-badge .title { color: #ffcc66; font-weight: bold; }
  .info-badge .subtle { color: #888; }
  #displacement-indicator {
    position: fixed;
    top: 12px;
    left: 12px;
    background: rgba(20, 20, 40, 0.88);
    border: 1px solid #444;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    z-index: 500;
  }
  #displacement-indicator .label { color: #888; }
  #displacement-indicator .value { color: #ff6666; font-weight: bold; }
  #flow-status { color: #66ccff; font-size: 11px; margin-top: 2px; }
  .toggle-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .toggle-row input[type="checkbox"] { accent-color: #ffcc66; }
</style>
</head>

<script>
// ============================================================
// CONFIG
// ============================================================
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('custom-cursor');
const gifEl = document.getElementById('gif-bg');

let W, H;

// ============================================================
// GIF LAYOUT
// ============================================================
const GIF_NAT_W = 400;
const GIF_NAT_H = 300;

let gifRect = { x: 0, y: 0, w: 0, h: 0, scale: 1 };

function updateGifRect() {
  const maxW = W * 0.85;
  const maxH = H * 0.85;
  const scale = Math.min(maxW / GIF_NAT_W, maxH / GIF_NAT_H);
  const gw = GIF_NAT_W * scale;
  const gh = GIF_NAT_H * scale;
  gifRect = { x: (W - gw) / 2, y: (H - gh) / 2, w: gw, h: gh, scale };
  gifEl.style.width = gw + 'px';
  gifEl.style.height = gh + 'px';
}

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  updateGifRect();
}
resize();
window.addEventListener('resize', resize);

// ============================================================
// OPTICAL FLOW - block matching on GIF frames
// ============================================================
const FLOW_BLOCK = 4;
const FLOW_SEARCH = 6;
const FLOW_INTERVAL = 80;
const FLOW_SMOOTH = 0.4;
const FLOW_VEL_SCALE = 0.15;
const FLOW_THRESHOLD = 0.05;

const flowCanvas = document.createElement('canvas');
const flowCtx = flowCanvas.getContext('2d', { willReadFrequently: true });

let prevGray = null;
let flowField = null;
let flowCols = 0, flowRows = 0;
let flowAvailable = false;
let lastFlowTime = 0;
let showFlowVis = false;
let steamIntensity = 1.5;

function toGrayscale(imgData) {
  const d = imgData.data;
  const w = imgData.width, h = imgData.height;
  const gray = new Uint8Array(w * h);
  for (let i = 0; i < w * h; i++) {
    const j = i * 4;
    gray[i] = (d[j] * 77 + d[j+1] * 150 + d[j+2] * 29) >> 8;
  }
  return { data: gray, w, h };
}

function downsample2x(gray) {
  const hw = gray.w >> 1;
  const hh = gray.h >> 1;
  const out = new Uint8Array(hw * hh);
  for (let y = 0; y < hh; y++) {
    for (let x = 0; x < hw; x++) {
      const i = (y * 2) * gray.w + (x * 2);
      out[y * hw + x] = (gray.data[i] + gray.data[i + 1] +
                          gray.data[i + gray.w] + gray.data[i + gray.w + 1]) >> 2;
    }
  }
  return { data: out, w: hw, h: hh };
}

function blockMatch(prev, curr, x0, y0) {
  let bestDx = 0, bestDy = 0, bestSAD = Infinity;
  const bw = Math.min(FLOW_BLOCK, curr.w - x0);
  const bh = Math.min(FLOW_BLOCK, curr.h - y0);

  for (let dy = -FLOW_SEARCH; dy <= FLOW_SEARCH; dy++) {
    for (let dx = -FLOW_SEARCH; dx <= FLOW_SEARCH; dx++) {
      let sad = 0;
      for (let py = 0; py < bh; py++) {
        const cy = y0 + py;
        const ry = cy + dy;
        if (ry < 0 || ry >= prev.h) { sad += bw * 128; continue; }
        for (let px = 0; px < bw; px++) {
          const cx = x0 + px;
          const rx = cx + dx;
          if (rx < 0 || rx >= prev.w) { sad += 128; continue; }
          sad += Math.abs(curr.data[cy * curr.w + cx] - prev.data[ry * prev.w + rx]);
        }
      }
      if (sad < bestSAD) {
        bestSAD = sad;
        bestDx = dx;
        bestDy = dy;
      }
    }
  }
  return { vx: -bestDx, vy: -bestDy };
}

function computeFlow(prev, curr) {
  const cols = Math.floor(curr.w / FLOW_BLOCK);
  const rows = Math.floor(curr.h / FLOW_BLOCK);
  const newFlow = [];

  for (let by = 0; by < rows; by++) {
    newFlow[by] = [];
    for (let bx = 0; bx < cols; bx++) {
      const match = blockMatch(prev, curr, bx * FLOW_BLOCK, by * FLOW_BLOCK);
      if (flowField && flowField[by] && flowField[by][bx]) {
        const old = flowField[by][bx];
        newFlow[by][bx] = {
          vx: old.vx * (1 - FLOW_SMOOTH) + match.vx * FLOW_SMOOTH,
          vy: old.vy * (1 - FLOW_SMOOTH) + match.vy * FLOW_SMOOTH,
        };
      } else {
        newFlow[by][bx] = match;
      }
    }
  }
  flowField = newFlow;
  flowCols = cols;
  flowRows = rows;
}

// ============================================================
// GIF FRAME DECODER (ImageDecoder API)
// ============================================================
let gifFrames = [];      // array of ImageBitmap
let gifFrameDurations = []; // ms per frame
let gifFrameIndex = 0;
let gifTotalDuration = 0;
let gifPlayTime = 0;
let gifDecoded = false;

async function decodeGifFrames() {
  const statusEl = document.getElementById('flow-status');
  try {
    statusEl.textContent = 'Flow: decoding GIF frames...';
    const resp = await fetch(gifEl.src);
    const decoder = new ImageDecoder({
      type: 'image/gif',
      data: resp.body,
    });
    await decoder.completed;

    const frameCount = decoder.tracks.selectedTrack.frameCount;
    // Composite canvas for proper GIF frame disposal
    const compCanvas = document.createElement('canvas');
    compCanvas.width = GIF_NAT_W;
    compCanvas.height = GIF_NAT_H;
    const compCtx = compCanvas.getContext('2d');

    for (let i = 0; i < frameCount; i++) {
      const result = await decoder.decode({ frameIndex: i });
      const vf = result.image;
      compCtx.drawImage(vf, 0, 0);
      const bitmap = await createImageBitmap(compCanvas);
      const dur = Math.max((vf.duration || 80000) / 1000, 20);
      gifFrames.push(bitmap);
      gifFrameDurations.push(dur);
      gifTotalDuration += dur;
      vf.close();
    }

    gifDecoded = true;
    gifEl.style.display = 'none';
    statusEl.textContent = 'Flow: decoded ' + gifFrames.length + ' frames';
    decoder.close();
  } catch (e) {
    statusEl.textContent = 'Flow: decode error - ' + e.message;
  }
}

function getCurrentGifFrame(dt) {
  if (!gifDecoded || gifFrames.length === 0) return null;
  gifPlayTime += dt * 1000;
  if (gifPlayTime >= gifTotalDuration) gifPlayTime -= gifTotalDuration;

  let acc = 0;
  for (let i = 0; i < gifFrames.length; i++) {
    acc += gifFrameDurations[i];
    if (gifPlayTime < acc) { gifFrameIndex = i; break; }
  }
  return gifFrames[gifFrameIndex];
}

let flowDebugCount = 0;
function captureAndComputeFlow(timestamp) {
  const statusEl = document.getElementById('flow-status');
  if (!gifDecoded) return;
  if (timestamp - lastFlowTime < FLOW_INTERVAL) return;
  lastFlowTime = timestamp;

  const frame = gifFrames[gifFrameIndex];
  if (!frame) return;

  flowCanvas.width = GIF_NAT_W;
  flowCanvas.height = GIF_NAT_H;
  flowCtx.drawImage(frame, 0, 0, GIF_NAT_W, GIF_NAT_H);
  const imgData = flowCtx.getImageData(0, 0, GIF_NAT_W, GIF_NAT_H);
  const gray = toGrayscale(imgData);
  const half = downsample2x(gray);

  flowDebugCount++;
  if (prevGray) {
    computeFlow(prevGray, half);
    flowAvailable = true;
    let nonZero = 0;
    for (let r = 0; r < flowRows; r++)
      for (let c = 0; c < flowCols; c++) {
        const m = Math.sqrt(flowField[r][c].vx**2 + flowField[r][c].vy**2);
        if (m >= FLOW_THRESHOLD) nonZero++;
      }
    statusEl.textContent =
      'Flow: ' + flowCols + 'x' + flowRows + ' | active=' + nonZero + ' | f=' + gifFrameIndex + '/' + gifFrames.length;
  }
  prevGray = half;
}

// ============================================================
// VELOCITY LOOKUP (optical flow with bilinear interpolation)
// ============================================================
function getSteamVelocityAt(sx, sy) {
  if (!flowAvailable || !flowField) return { vx: 0, vy: 0, inZone: false };

  const gx = (sx - gifRect.x) / gifRect.scale;
  const gy = (sy - gifRect.y) / gifRect.scale;
  if (gx < 0 || gx >= GIF_NAT_W || gy < 0 || gy >= GIF_NAT_H) {
    return { vx: 0, vy: 0, inZone: false };
  }

  const fx = (gx * 0.5) / FLOW_BLOCK - 0.5;
  const fy = (gy * 0.5) / FLOW_BLOCK - 0.5;
  const bx = Math.floor(fx);
  const by = Math.floor(fy);
  const tx = fx - bx;
  const ty = fy - by;

  if (bx < 0 || bx >= flowCols - 1 || by < 0 || by >= flowRows - 1) {
    return { vx: 0, vy: 0, inZone: false };
  }

  const f00 = flowField[by][bx];
  const f10 = flowField[by][bx + 1];
  const f01 = flowField[by + 1][bx];
  const f11 = flowField[by + 1][bx + 1];

  const hvx = f00.vx*(1-tx)*(1-ty) + f10.vx*tx*(1-ty) +
              f01.vx*(1-tx)*ty     + f11.vx*tx*ty;
  const hvy = f00.vy*(1-tx)*(1-ty) + f10.vy*tx*(1-ty) +
              f01.vy*(1-tx)*ty     + f11.vy*tx*ty;

  const fullVx = hvx * 2;
  const fullVy = hvy * 2;

  const mag = Math.sqrt(fullVx * fullVx + fullVy * fullVy);
  if (mag < FLOW_THRESHOLD) return { vx: 0, vy: 0, inZone: false };

  const scale = gifRect.scale * FLOW_VEL_SCALE;
  return { vx: fullVx * scale, vy: fullVy * scale, inZone: true };
}

// ============================================================
// FLOW FIELD VISUALIZATION
// ============================================================
function sampleFlowAt(fx, fy) {
  // Bilinear interpolation on flow field
  const bx = fx - 0.5;
  const by = fy - 0.5;
  const ix = Math.floor(bx);
  const iy = Math.floor(by);
  const tx = bx - ix;
  const ty = by - iy;
  if (ix < 0 || ix >= flowCols - 1 || iy < 0 || iy >= flowRows - 1) return null;
  const f00 = flowField[iy][ix];
  const f10 = flowField[iy][ix + 1];
  const f01 = flowField[iy + 1][ix];
  const f11 = flowField[iy + 1][ix + 1];
  return {
    vx: f00.vx*(1-tx)*(1-ty) + f10.vx*tx*(1-ty) + f01.vx*(1-tx)*ty + f11.vx*tx*ty,
    vy: f00.vy*(1-tx)*(1-ty) + f10.vy*tx*(1-ty) + f01.vy*(1-tx)*ty + f11.vy*tx*ty,
  };
}

function drawFlowField() {
  if (!showFlowVis || !flowAvailable || !flowField) return;

  // Dense sampling: step in GIF pixel space
  const step = 12; // pixels in original GIF coords
  ctx.save();
  for (let gy = 0; gy < GIF_NAT_H; gy += step) {
    for (let gx = 0; gx < GIF_NAT_W; gx += step) {
      // Convert GIF coords to flow grid coords
      const fx = (gx * 0.5) / FLOW_BLOCK;
      const fy = (gy * 0.5) / FLOW_BLOCK;
      const f = sampleFlowAt(fx, fy);
      if (!f) continue;

      const mag = Math.sqrt(f.vx * f.vx + f.vy * f.vy);
      if (mag < FLOW_THRESHOLD / steamIntensity) continue;

      const sx = gifRect.x + gx * gifRect.scale;
      const sy = gifRect.y + gy * gifRect.scale;

      const arrowLen = Math.max(mag * gifRect.scale * 6 * steamIntensity, 4);
      const nx = f.vx / mag;
      const ny = f.vy / mag;
      const alpha = Math.min(1, mag * 0.6);

      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + nx * arrowLen, sy + ny * arrowLen);
      ctx.strokeStyle = `rgba(100,200,255,${alpha})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      const headLen = Math.max(3, arrowLen * 0.35);
      const angle = Math.atan2(ny, nx);
      ctx.beginPath();
      ctx.moveTo(sx + nx * arrowLen, sy + ny * arrowLen);
      ctx.lineTo(sx + nx * arrowLen - headLen * Math.cos(angle - 0.4),
                 sy + ny * arrowLen - headLen * Math.sin(angle - 0.4));
      ctx.lineTo(sx + nx * arrowLen - headLen * Math.cos(angle + 0.4),
                 sy + ny * arrowLen - headLen * Math.sin(angle + 0.4));
      ctx.closePath();
      ctx.fillStyle = `rgba(100,200,255,${alpha})`;
      ctx.fill();
    }
  }
  ctx.restore();
}

// ============================================================
// PSEUDO-HAPTIC CURSOR
// ============================================================
let mouseX = 0, mouseY = 0;
let prevMouseX = 0, prevMouseY = 0;
let mouseInited = false;
let cursorX = 0, cursorY = 0;
let gain = 7.5;
let effectEnabled = true;
let showTrail = false;
let showDispLine = true;
let cursorTrail = [];

document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  if (!mouseInited) {
    prevMouseX = mouseX;
    prevMouseY = mouseY;
    cursorX = mouseX;
    cursorY = mouseY;
    mouseInited = true;
  }
});

function updateCursor(dt, time) {
  const dmx = mouseX - prevMouseX;
  const dmy = mouseY - prevMouseY;
  prevMouseX = mouseX;
  prevMouseY = mouseY;

  if (!effectEnabled) {
    cursorX = mouseX;
    cursorY = mouseY;
    return;
  }

  const steam = getSteamVelocityAt(cursorX, cursorY);

  if (steam.inZone) {
    // ポインタ移動量 + 速度場の成分
    cursorX += dmx + steam.vx * gain * dt * 30;
    cursorY += dmy + steam.vy * gain * dt * 30;
  } else {
    // ゾーン外: 変位を保持したままポインタ移動に追従
    cursorX += dmx;
    cursorY += dmy;
  }

  if (showTrail) {
    cursorTrail.push({ x: cursorX, y: cursorY, t: 1.0 });
    if (cursorTrail.length > 30) cursorTrail.shift();
  }
}

function drawCursorTrail() {
  if (!showTrail) return;
  for (let i = 0; i < cursorTrail.length; i++) {
    const p = cursorTrail[i];
    p.t -= 0.03;
    if (p.t <= 0) { cursorTrail.splice(i, 1); i--; continue; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3 * p.t, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,200,100,${p.t * 0.5})`;
    ctx.fill();
  }
}

// ============================================================
// DISPLACEMENT VISUALIZATION
// ============================================================
function drawDisplacementLine() {
  const dx = cursorX - mouseX;
  const dy = cursorY - mouseY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist > 1 && effectEnabled && showDispLine) {
    ctx.beginPath();
    ctx.moveTo(mouseX, mouseY);
    ctx.lineTo(cursorX, cursorY);
    ctx.strokeStyle = 'rgba(255,100,100,0.4)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.beginPath();
    ctx.arc(mouseX, mouseY, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,100,100,0.5)';
    ctx.fill();
  }

  document.getElementById('disp-value').textContent = dist.toFixed(1) + ' px';
}

// ============================================================
// UI CONTROLS
// ============================================================
document.getElementById('gain-slider').addEventListener('input', function() {
  gain = parseFloat(this.value);
  document.getElementById('gain-val').textContent = gain.toFixed(1);
});
document.getElementById('steam-slider').addEventListener('input', function() {
  steamIntensity = parseFloat(this.value);
  document.getElementById('steam-val').textContent = steamIntensity.toFixed(1);
});
document.getElementById('toggle-effect').addEventListener('change', function() {
  effectEnabled = this.checked;
});
document.getElementById('toggle-trail').addEventListener('change', function() {
  showTrail = this.checked;
  if (!showTrail) cursorTrail = [];
});
document.getElementById('toggle-displine').addEventListener('change', function() {
  showDispLine = this.checked;
});
document.getElementById('toggle-flowvis').addEventListener('change', function() {
  showFlowVis = this.checked;
});

// ============================================================
// MAIN LOOP
// ============================================================
let lastTime = 0;

function loop(timestamp) {
  const time = timestamp / 1000;
  const dt = Math.min(time - lastTime, 0.05);
  lastTime = time;

  ctx.clearRect(0, 0, W, H);

  // Draw decoded GIF frame on canvas
  const gifFrame = getCurrentGifFrame(dt);
  if (gifFrame) {
    ctx.drawImage(gifFrame, gifRect.x, gifRect.y, gifRect.w, gifRect.h);
  }

  captureAndComputeFlow(timestamp);
  drawFlowField();
  updateCursor(dt, time);
  drawDisplacementLine();
  drawCursorTrail();

  cursorEl.style.left = (cursorX - 2) + 'px';
  cursorEl.style.top = (cursorY - 2) + 'px';

  requestAnimationFrame(loop);
}

window.addEventListener('resize', resize);

// GIF load完了後にフレーム分解してからループ開始
async function startApp() {
  if (!gifEl.complete) {
    await new Promise(r => gifEl.addEventListener('load', r));
  }
  await decodeGifFrames();
  requestAnimationFrame(loop);
}
startApp();
</script>
