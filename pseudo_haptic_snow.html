<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pseudo-Haptic Pixel Art - Snow / Blizzard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #04050a;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: none;
  }
  #main-canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: none;
  }
  #custom-cursor {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    width: 16px;
    height: 24px;
    transition: none;
  }
  #cursor-arrow { position: absolute; top: 0; left: 0; }
  #controls {
    position: fixed;
    top: 12px;
    right: 12px;
    background: rgba(20, 20, 40, 0.92);
    border: 1px solid #444;
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 13px;
    line-height: 1.7;
    max-width: 310px;
    z-index: 500;
  }
  #controls h3 {
    font-size: 14px;
    margin-bottom: 8px;
    color: #aaddff;
    border-bottom: 1px solid #444;
    padding-bottom: 4px;
  }
  #controls label {
    display: flex; align-items: center; gap: 8px; margin: 6px 0;
  }
  #controls input[type="range"] { width: 120px; accent-color: #aaddff; }
  #controls .val { color: #aaddff; min-width: 32px; text-align: right; }
  .info-badge {
    position: fixed;
    bottom: 12px;
    left: 12px;
    background: rgba(20, 20, 40, 0.88);
    border: 1px solid #444;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 12px;
    line-height: 1.6;
    z-index: 500;
    max-width: 400px;
  }
  .info-badge .title { color: #aaddff; font-weight: bold; }
  .info-badge .subtle { color: #888; }
  #displacement-indicator {
    position: fixed;
    top: 12px;
    left: 12px;
    background: rgba(20, 20, 40, 0.88);
    border: 1px solid #444;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    z-index: 500;
  }
  #displacement-indicator .label { color: #888; }
  #displacement-indicator .value { color: #ff6666; font-weight: bold; }
  .toggle-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .toggle-row input[type="checkbox"] { accent-color: #aaddff; }
</style>
</head>
<body>

<canvas id="main-canvas"></canvas>

<div id="custom-cursor">
  <svg id="cursor-arrow" width="16" height="24" viewBox="0 0 16 24">
    <polygon points="1,1 1,19 5.5,15 9,22 12,20.5 8,14 14,12"
             fill="white" stroke="#333" stroke-width="1.2"/>
  </svg>
</div>

<div id="controls">
  <h3>Parameters</h3>
  <label>
    Gain (C/D ratio)
    <input type="range" id="gain-slider" min="0" max="10" step="0.1" value="0.3">
    <span class="val" id="gain-val">0.3</span>
  </label>
  <label>
    Blizzard intensity
    <input type="range" id="wave-slider" min="0.2" max="2" step="0.1" value="1.0">
    <span class="val" id="wave-val">1.0</span>
  </label>
  <label>
    Snow particle count
    <input type="range" id="count-slider" min="10" max="120" step="5" value="80">
    <span class="val" id="count-val">80</span>
  </label>
  <div class="toggle-row">
    <input type="checkbox" id="toggle-effect" checked>
    <label for="toggle-effect">Enable pseudo-haptic effect</label>
  </div>
  <div class="toggle-row">
    <input type="checkbox" id="toggle-trail">
    <label for="toggle-trail">Show cursor trail</label>
  </div>
  <div class="toggle-row">
    <input type="checkbox" id="toggle-displine" checked>
    <label for="toggle-displine">Show displacement line</label>
  </div>
  <div class="toggle-row">
    <input type="checkbox" id="toggle-flowfield">
    <label for="toggle-flowfield">Show velocity field</label>
  </div>
</div>

<div id="displacement-indicator">
  <span class="label">Cursor displacement: </span>
  <span class="value" id="disp-value">0.0 px</span>
</div>

<div class="info-badge">
  <div class="title">Pseudo-Haptic Pixel Art Demo — Snow</div>
  <div>吹雪の中にカーソルを置くと、<br>
  冷たい風に抗えずカーソルが流されていきます。</div>
  <div class="subtle">パーティクルシステムで吹雪を生成し、視覚的カーソル変位で疑似力覚を提示</div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const PIXEL_SIZE = 6;
const COLS = 160;
const ROWS = 120;

const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('custom-cursor');

let W, H;
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
}
resize();
window.addEventListener('resize', resize);

// ============================================================
// PALETTE
// ============================================================
const PAL = {
  // Sky gradient (oppressive overcast night)
  skyTop:      '#04050a',
  skyMid:      '#0a0e18',
  skyLow:      '#141822',
  skyHorizon:  '#1a1e2a',
  skyPink:     '#1e1a24',
  // Clouds (heavy, dark)
  cloudDark:   '#0e1018',
  cloudMid:    '#181c28',
  cloudLight:  '#222838',
  // Mountains
  mtnFar:      '#0e1420',
  mtnMid:      '#141c2c',
  mtnNear:     '#1a2434',
  mtnSnow:     '#3a4458',
  // Pine trees
  treeDark:    '#060e08',
  treeMid:     '#0e180e',
  treeLight:   '#142014',
  treeSnow:    '#687888',
  trunk:       '#1a1208',
  // Snow ground (muted, dark)
  snowBright:  '#8898aa',
  snowMid:     '#687888',
  snowDark:    '#505e70',
  snowShadow:  '#3a4454',
  // Cabin
  cabinWall:   '#2a1c10',
  cabinWallLt: '#3a2818',
  cabinRoof:   '#1a100a',
  cabinRoofSn: '#586878',
  windowGlow:  '#cc8833',
  windowBright:'#ddaa55',
  doorWood:    '#1e1208',
  chimney:     '#2a1c10',
  // Lamp
  lampPost:    '#1a1a20',
  lampGlow:    '#cc9944',
  lampBright:  '#ddbb66',
  // Figure
  figureDark:  '#0a0a10',
  figureMid:   '#141418',
  scarf:       '#882222',
};

// ============================================================
// PIXEL ART SCENE (Winter / Snow)
// ============================================================
const sceneCanvas = document.createElement('canvas');
const sceneCtx = sceneCanvas.getContext('2d');

// Key Y positions in grid coords
const GROUND_Y = 85;  // Where snow ground starts
const MTN_BASE = 85;  // Mountains rest on ground line

function drawPixel(sctx, gx, gy, color) {
  const ox = Math.floor((W - COLS * PIXEL_SIZE) / 2);
  const oy = Math.floor((H - ROWS * PIXEL_SIZE) / 2);
  sctx.fillStyle = color;
  sctx.fillRect(ox + gx * PIXEL_SIZE, oy + gy * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
}

function drawRect(sctx, gx, gy, gw, gh, color) {
  const ox = Math.floor((W - COLS * PIXEL_SIZE) / 2);
  const oy = Math.floor((H - ROWS * PIXEL_SIZE) / 2);
  sctx.fillStyle = color;
  sctx.fillRect(ox + gx * PIXEL_SIZE, oy + gy * PIXEL_SIZE, gw * PIXEL_SIZE, gh * PIXEL_SIZE);
}

function lerpColor(c1, c2, t) {
  const r1 = parseInt(c1.slice(1, 3), 16), g1 = parseInt(c1.slice(3, 5), 16), b1 = parseInt(c1.slice(5, 7), 16);
  const r2 = parseInt(c2.slice(1, 3), 16), g2 = parseInt(c2.slice(3, 5), 16), b2 = parseInt(c2.slice(5, 7), 16);
  const r = Math.round(r1 + (r2 - r1) * t);
  const g = Math.round(g1 + (g2 - g1) * t);
  const b = Math.round(b1 + (b2 - b1) * t);
  return `rgb(${r},${g},${b})`;
}

function buildScene() {
  sceneCanvas.width = W;
  sceneCanvas.height = H;
  const s = sceneCtx;

  const ox = Math.floor((W - COLS * PIXEL_SIZE) / 2);
  const oy = Math.floor((H - ROWS * PIXEL_SIZE) / 2);

  // --- Sky gradient (oppressive dark overcast) ---
  for (let y = 0; y < GROUND_Y; y++) {
    const t = y / GROUND_Y;
    let color;
    if (t < 0.3) color = lerpColor(PAL.skyTop, PAL.skyMid, t / 0.3);
    else if (t < 0.6) color = lerpColor(PAL.skyMid, PAL.skyLow, (t - 0.3) / 0.3);
    else if (t < 0.85) color = lerpColor(PAL.skyLow, PAL.skyHorizon, (t - 0.6) / 0.25);
    else color = lerpColor(PAL.skyHorizon, PAL.skyPink, (t - 0.85) / 0.15);
    drawRect(s, 0, y, COLS, 1, color);
  }

  // --- Heavy clouds (no stars visible, oppressive sky) ---
  const cloudLayers = [
    { y: 5,  seeds: [0,18,40,62,88,110,135,155], h: 8 },
    { y: 15, seeds: [10,30,55,80,105,130,148], h: 10 },
    { y: 28, seeds: [5,25,50,75,95,120,142,158], h: 7 },
    { y: 38, seeds: [15,45,68,100,125,150], h: 6 },
  ];
  for (const cl of cloudLayers) {
    for (const sx of cl.seeds) {
      const w = 8 + ((sx * 7) % 12);
      for (let dy = 0; dy < cl.h; dy++) {
        for (let dx = 0; dx < w; dx++) {
          const gx = sx + dx;
          if (gx >= COLS) continue;
          const gy = cl.y + dy;
          if (gy >= GROUND_Y) continue;
          const nx = (dx / w - 0.5) * 2;
          const ny = (dy / cl.h - 0.5) * 2;
          if (nx * nx + ny * ny < 0.9) {
            const depth = 1 - (nx * nx + ny * ny);
            const alpha = 0.06 + depth * 0.08;
            const c = dy < cl.h * 0.4 ? PAL.cloudLight : PAL.cloudMid;
            const cr = parseInt(c.slice(1,3),16), cg = parseInt(c.slice(3,5),16), cb = parseInt(c.slice(5,7),16);
            s.fillStyle = `rgba(${cr},${cg},${cb},${alpha})`;
            s.fillRect(ox + gx * PIXEL_SIZE, oy + gy * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
          }
        }
      }
    }
  }

  // --- A few faint stars peeking through cloud gaps ---
  const faintStars = [48,3, 95,10, 140,5, 25,8, 120,7];
  for (let i = 0; i < faintStars.length; i += 2) {
    s.fillStyle = `rgba(180,190,220,0.15)`;
    s.fillRect(ox + faintStars[i] * PIXEL_SIZE, oy + faintStars[i+1] * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
  }

  // --- Background mountains ---
  const mountains = [
    { peaks: [{x:0,y:55},{x:15,y:40},{x:35,y:48},{x:55,y:34},{x:75,y:44},{x:100,y:36},{x:125,y:42},{x:145,y:38},{x:160,y:50}], color: PAL.mtnFar, snowLine: 40 },
    { peaks: [{x:0,y:62},{x:20,y:48},{x:45,y:55},{x:65,y:45},{x:90,y:52},{x:110,y:46},{x:135,y:50},{x:155,y:56},{x:160,y:58}], color: PAL.mtnMid, snowLine: 50 },
    { peaks: [{x:0,y:68},{x:15,y:58},{x:30,y:64},{x:50,y:54},{x:70,y:62},{x:85,y:55},{x:105,y:60},{x:125,y:52},{x:145,y:58},{x:160,y:65}], color: PAL.mtnNear, snowLine: 58 },
  ];

  for (const mtn of mountains) {
    for (let x = 0; x < COLS; x++) {
      let peakY = GROUND_Y;
      for (let i = 0; i < mtn.peaks.length - 1; i++) {
        const p1 = mtn.peaks[i], p2 = mtn.peaks[i + 1];
        if (x >= p1.x && x <= p2.x) {
          const t = (x - p1.x) / (p2.x - p1.x);
          const st = t * t * (3 - 2 * t);
          peakY = p1.y + (p2.y - p1.y) * st;
          break;
        }
      }
      peakY = Math.round(peakY);
      for (let y = peakY; y < GROUND_Y; y++) {
        if (y < mtn.snowLine) {
          const snowT = (mtn.snowLine - y) / (mtn.snowLine - peakY + 1);
          drawPixel(s, x, y, lerpColor(mtn.color, PAL.mtnSnow, 0.3 + snowT * 0.5));
        } else {
          drawPixel(s, x, y, mtn.color);
        }
      }
    }
  }

  // --- Pine trees (fewer, positioned to frame the cabin) ---
  const trees = [
    { x: 6,   y: GROUND_Y, h: 20, w: 7 },
    { x: 18,  y: GROUND_Y, h: 26, w: 9 },
    { x: 32,  y: GROUND_Y, h: 17, w: 6 },
    { x: 50,  y: GROUND_Y, h: 22, w: 8 },
    // gap for cabin area (60-105)
    { x: 112, y: GROUND_Y, h: 24, w: 9 },
    { x: 126, y: GROUND_Y, h: 18, w: 7 },
    { x: 140, y: GROUND_Y, h: 28, w: 10 },
    { x: 154, y: GROUND_Y, h: 20, w: 7 },
  ];

  function drawTree(s, tree) {
    const cx = tree.x, baseY = tree.y, topY = baseY - tree.h;
    drawRect(s, cx, baseY - 3, 1, 3, PAL.trunk);
    const tiers = 3;
    for (let tier = 0; tier < tiers; tier++) {
      const tierTop = topY + Math.floor(tier * tree.h / (tiers + 1));
      const tierBot = topY + Math.floor((tier + 2) * tree.h / (tiers + 1));
      const tierH = tierBot - tierTop;
      for (let row = 0; row < tierH; row++) {
        const gy = tierTop + row;
        if (gy >= baseY) continue;
        const progress = row / tierH;
        const halfW = Math.floor(1 + progress * tree.w * 0.5);
        for (let dx = -halfW; dx <= halfW; dx++) {
          const gx = cx + dx;
          if (gx < 0 || gx >= COLS) continue;
          const edgeT = Math.abs(dx) / (halfW + 1);
          drawPixel(s, gx, gy, edgeT > 0.7 ? PAL.treeDark : (edgeT > 0.3 ? PAL.treeMid : PAL.treeLight));
        }
        if (row <= 1) {
          const snowHalfW = Math.floor(halfW * 0.8);
          for (let dx = -snowHalfW; dx <= snowHalfW; dx++) {
            const gx = cx + dx;
            if (gx < 0 || gx >= COLS) continue;
            if (Math.random() < 0.6) drawPixel(s, gx, gy, PAL.treeSnow);
          }
        }
      }
    }
  }
  for (const tree of trees) drawTree(s, tree);

  // --- Snow-covered ground ---
  for (let y = GROUND_Y; y < ROWS; y++) {
    const t = (y - GROUND_Y) / (ROWS - GROUND_Y);
    let color;
    if (t < 0.15) color = lerpColor(PAL.snowBright, PAL.snowMid, t / 0.15);
    else if (t < 0.5) color = lerpColor(PAL.snowMid, PAL.snowDark, (t - 0.15) / 0.35);
    else color = lerpColor(PAL.snowDark, PAL.snowShadow, (t - 0.5) / 0.5);
    drawRect(s, 0, y, COLS, 1, color);
  }

  // Snow drift ridges
  for (let x = 0; x < COLS; x++) {
    const drift = Math.sin(x * 0.04) * 1.5 + Math.sin(x * 0.12) * 0.5;
    const gy = GROUND_Y + Math.round(drift);
    if (gy >= GROUND_Y && gy < ROWS) drawPixel(s, x, gy, PAL.snowBright);
  }

  // Sparkle pixels
  for (let i = 0; i < 50; i++) {
    const sx = Math.floor(Math.random() * COLS);
    const sy = GROUND_Y + Math.floor(Math.random() * (ROWS - GROUND_Y));
    drawPixel(s, sx, sy, Math.random() < 0.5 ? '#ffffff' : PAL.snowBright);
  }

  // ============================================================
  // CABIN (warm light focal point)
  // ============================================================
  const cabinX = 72; // left edge of cabin
  const cabinW = 22;
  const cabinH = 16;
  const cabinTop = GROUND_Y - cabinH;
  const roofPeak = cabinTop - 6;

  // -- Cabin walls --
  drawRect(s, cabinX, cabinTop, cabinW, cabinH, PAL.cabinWall);
  // Left-side lit
  drawRect(s, cabinX, cabinTop, 3, cabinH, PAL.cabinWallLt);
  // Log lines
  for (let i = 0; i < cabinH; i += 3) {
    drawRect(s, cabinX, cabinTop + i, cabinW, 1, PAL.cabinRoof);
  }

  // -- Roof (triangle) --
  const roofCx = cabinX + Math.floor(cabinW / 2);
  for (let row = 0; row <= cabinTop - roofPeak; row++) {
    const gy = roofPeak + row;
    const halfW = Math.floor(1 + row * (cabinW / 2 + 2) / (cabinTop - roofPeak));
    drawRect(s, roofCx - halfW, gy, halfW * 2 + 1, 1, PAL.cabinRoof);
  }
  // Snow on roof
  for (let row = 0; row <= cabinTop - roofPeak; row++) {
    const gy = roofPeak + row;
    const halfW = Math.floor(1 + row * (cabinW / 2 + 2) / (cabinTop - roofPeak));
    if (row <= 2) {
      drawRect(s, roofCx - halfW, gy, halfW * 2 + 1, 1, PAL.cabinRoofSn);
    } else {
      // Snow only on the upper edge
      for (let dx = -halfW; dx <= halfW; dx++) {
        if (Math.random() < 0.3) drawPixel(s, roofCx + dx, gy, PAL.cabinRoofSn);
      }
      break;
    }
  }

  // -- Chimney --
  const chimX = cabinX + cabinW - 5;
  drawRect(s, chimX, roofPeak - 5, 3, 5, PAL.chimney);
  // Snow on chimney
  drawRect(s, chimX - 1, roofPeak - 6, 5, 1, PAL.cabinRoofSn);

  // -- Door --
  const doorX = cabinX + Math.floor(cabinW / 2) - 2;
  const doorH = 8;
  drawRect(s, doorX, GROUND_Y - doorH, 4, doorH, PAL.doorWood);
  // Door handle
  drawPixel(s, doorX + 3, GROUND_Y - 4, '#aa8844');

  // -- Windows (glowing warm!) --
  // Left window
  const wl = cabinX + 2;
  const wt = cabinTop + 4;
  drawRect(s, wl, wt, 5, 4, PAL.windowBright);
  drawRect(s, wl, wt, 5, 1, PAL.windowGlow);
  drawRect(s, wl, wt + 3, 5, 1, PAL.windowGlow);
  // Window frame cross
  drawRect(s, wl + 2, wt, 1, 4, PAL.cabinWall);
  drawRect(s, wl, wt + 2, 5, 1, PAL.cabinWall);

  // Right window
  const wr = cabinX + cabinW - 7;
  drawRect(s, wr, wt, 5, 4, PAL.windowBright);
  drawRect(s, wr, wt, 5, 1, PAL.windowGlow);
  drawRect(s, wr, wt + 3, 5, 1, PAL.windowGlow);
  drawRect(s, wr + 2, wt, 1, 4, PAL.cabinWall);
  drawRect(s, wr, wt + 2, 5, 1, PAL.cabinWall);

  // -- Window glow spill (warm light radiating outward) --
  const windowCenters = [
    { x: wl + 2, y: wt + 2 },
    { x: wr + 2, y: wt + 2 },
  ];
  for (const wc of windowCenters) {
    for (let dy = -6; dy <= 6; dy++) {
      for (let dx = -8; dx <= 8; dx++) {
        const gx = wc.x + dx, gy = wc.y + dy;
        if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) continue;
        // Don't overwrite cabin body
        if (gx >= cabinX && gx < cabinX + cabinW && gy >= roofPeak && gy < GROUND_Y) continue;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 8) {
          const alpha = 0.12 * (1 - dist / 8);
          s.fillStyle = `rgba(255, 180, 80, ${alpha})`;
          s.fillRect(ox + gx * PIXEL_SIZE, oy + gy * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
        }
      }
    }
  }

  // -- Warm light pool on snow from windows & door --
  const doorCx = doorX + 2;
  const lightSources = [
    { x: wl + 2, y: GROUND_Y, spread: 12, intensity: 0.14 },
    { x: wr + 2, y: GROUND_Y, spread: 12, intensity: 0.14 },
    { x: doorCx, y: GROUND_Y, spread: 10, intensity: 0.10 },
  ];
  for (const ls of lightSources) {
    for (let dy = 0; dy < 12; dy++) {
      for (let dx = -ls.spread; dx <= ls.spread; dx++) {
        const gx = ls.x + dx;
        const gy = ls.y + dy;
        if (gx < 0 || gx >= COLS || gy >= ROWS) continue;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const maxDist = ls.spread + dy * 0.5;
        if (dist < maxDist) {
          const alpha = ls.intensity * (1 - dist / maxDist);
          s.fillStyle = `rgba(255, 170, 70, ${alpha})`;
          s.fillRect(ox + gx * PIXEL_SIZE, oy + gy * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
        }
      }
    }
  }

  // ============================================================
  // LAMP POST (warm glow in the foreground)
  // ============================================================
  const lampX = 58;
  const lampTopY = GROUND_Y - 20;

  // Post
  drawRect(s, lampX, lampTopY + 2, 1, GROUND_Y - lampTopY - 2, PAL.lampPost);
  // Lamp head
  drawRect(s, lampX - 1, lampTopY, 3, 2, PAL.lampPost);
  // Lamp bulb
  drawPixel(s, lampX, lampTopY + 2, PAL.lampBright);

  // Lamp light cone (warm pool of light)
  for (let dy = 0; dy < 25; dy++) {
    const spreadAtDy = 2 + dy * 0.8;
    for (let dx = -Math.ceil(spreadAtDy); dx <= Math.ceil(spreadAtDy); dx++) {
      const gx = lampX + dx;
      const gy = lampTopY + 2 + dy;
      if (gx < 0 || gx >= COLS || gy >= ROWS) continue;
      // Don't overwrite cabin
      if (gx >= cabinX && gx < cabinX + cabinW && gy >= roofPeak && gy < GROUND_Y) continue;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const maxR = spreadAtDy + 2;
      if (dist < maxR) {
        const alpha = 0.18 * (1 - dist / maxR) * (1 - dy / 30);
        s.fillStyle = `rgba(255, 200, 100, ${alpha})`;
        s.fillRect(ox + gx * PIXEL_SIZE, oy + gy * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
      }
    }
  }

  // ============================================================
  // FOOTPRINTS (from cabin, past lamp, to the lone figure — and beyond)
  // ============================================================
  const footprints = [
    { x: 80, y: GROUND_Y + 1 },
    { x: 76, y: GROUND_Y + 1 },
    { x: 72, y: GROUND_Y + 2 },
    { x: 68, y: GROUND_Y + 3 },
    { x: 64, y: GROUND_Y + 3 },
    { x: 60, y: GROUND_Y + 4 },
    { x: 56, y: GROUND_Y + 5 },
    { x: 52, y: GROUND_Y + 5 },
    { x: 48, y: GROUND_Y + 6 },
    { x: 44, y: GROUND_Y + 7 },
    { x: 40, y: GROUND_Y + 7 },
    { x: 36, y: GROUND_Y + 8 },
    // Getting fainter, being covered by snow...
    { x: 32, y: GROUND_Y + 9 },
    { x: 28, y: GROUND_Y + 10 },
  ];
  for (let fi = 0; fi < footprints.length; fi++) {
    const fp = footprints[fi];
    if (fp.x >= 0 && fp.x < COLS && fp.y < ROWS) {
      // Footprints get fainter as they go further from the cabin
      const fade = 1 - fi / footprints.length;
      s.fillStyle = `rgba(50, 60, 80, ${0.25 * fade})`;
      s.fillRect(ox + fp.x * PIXEL_SIZE, oy + fp.y * PIXEL_SIZE, PIXEL_SIZE * 2, PIXEL_SIZE);
    }
  }

  // ============================================================
  // LONE FIGURE (standing in the snow, between lamp and cabin)
  // ============================================================
  const figX = 42;
  const figBaseY = GROUND_Y;

  // Legs
  drawPixel(s, figX - 1, figBaseY - 1, PAL.figureDark);
  drawPixel(s, figX + 1, figBaseY - 1, PAL.figureDark);
  drawPixel(s, figX - 1, figBaseY - 2, PAL.figureDark);
  drawPixel(s, figX + 1, figBaseY - 2, PAL.figureDark);
  // Body (coat)
  for (let dy = -6; dy <= -3; dy++) {
    drawPixel(s, figX - 1, figBaseY + dy, PAL.figureDark);
    drawPixel(s, figX, figBaseY + dy, PAL.figureMid);
    drawPixel(s, figX + 1, figBaseY + dy, PAL.figureDark);
  }
  // Shoulders wider
  drawPixel(s, figX - 2, figBaseY - 5, PAL.figureDark);
  drawPixel(s, figX + 2, figBaseY - 5, PAL.figureDark);
  drawPixel(s, figX - 2, figBaseY - 6, PAL.figureDark);
  drawPixel(s, figX + 2, figBaseY - 6, PAL.figureDark);
  // Head
  drawPixel(s, figX - 1, figBaseY - 7, PAL.figureDark);
  drawPixel(s, figX, figBaseY - 7, PAL.figureMid);
  drawPixel(s, figX + 1, figBaseY - 7, PAL.figureDark);
  drawPixel(s, figX, figBaseY - 8, PAL.figureDark);
  // Scarf (dark red, trailing in wind)
  drawPixel(s, figX, figBaseY - 6, PAL.scarf);
  drawPixel(s, figX + 1, figBaseY - 6, PAL.scarf);
  drawPixel(s, figX + 2, figBaseY - 7, PAL.scarf);
  drawPixel(s, figX + 3, figBaseY - 7, PAL.scarf);
  // Snow on shoulders
  drawPixel(s, figX - 2, figBaseY - 6, '#4a5868');
  drawPixel(s, figX + 2, figBaseY - 6, '#4a5868');

  // ============================================================
  // VIGNETTE (darken edges of scene)
  // ============================================================
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const nx = (x / COLS - 0.5) * 2;
      const ny = (y / ROWS - 0.5) * 2;
      const dist = Math.sqrt(nx * nx + ny * ny);
      if (dist > 0.6) {
        const alpha = Math.min(0.5, (dist - 0.6) * 0.8);
        s.fillStyle = `rgba(0, 0, 0, ${alpha})`;
        s.fillRect(ox + x * PIXEL_SIZE, oy + y * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
      }
    }
  }
}

// ============================================================
// SNOW PARTICLES (Blizzard)
// ============================================================
let snowParticles = [];
let snowCount = 80;
let blizzardIntensity = 1.0;

function createSnowParticle(randomY = false) {
  const ox = Math.floor((W - COLS * PIXEL_SIZE) / 2);
  const oy = Math.floor((H - ROWS * PIXEL_SIZE) / 2);

  // Snow zone: from top of scene down to just above ground
  const zoneTop = 0;
  const zoneBottom = GROUND_Y;

  // Place randomly across the sky
  const xGrid = Math.random() * COLS;
  const yGrid = randomY
    ? zoneTop + Math.random() * (zoneBottom - zoneTop)
    : zoneTop - Math.random() * 10; // Start above the scene

  // Size variation: small to medium flakes
  const size = 0.5 + Math.random() * 1.5;

  // Base fall speed + wind horizontal speed
  const baseFallSpeed = 0.3 + Math.random() * 0.6;
  const baseWindSpeed = 0.4 + Math.random() * 0.5;

  return {
    x: ox + xGrid * PIXEL_SIZE,
    y: oy + yGrid * PIXEL_SIZE,
    // Horizontal wind: mostly left-to-right
    vx: baseWindSpeed,
    // Vertical: falling down
    vy: baseFallSpeed,
    life: randomY ? 0.3 + Math.random() * 0.7 : 1.0,
    size: size,
    // Sinusoidal horizontal wobble
    wobblePhase: Math.random() * Math.PI * 2,
    wobbleFreq: 0.5 + Math.random() * 1.5,
    wobbleAmp: 0.1 + Math.random() * 0.3,
    // Vertical flutter
    flutterPhase: Math.random() * Math.PI * 2,
    flutterFreq: 0.3 + Math.random() * 0.8,
    flutterAmp: 0.05 + Math.random() * 0.1,
    // Brightness variation
    brightness: 0.6 + Math.random() * 0.4,
  };
}

function initSnow() {
  snowParticles = [];
  for (let i = 0; i < snowCount; i++) snowParticles.push(createSnowParticle(true));
}
initSnow();

function updateSnow(dt, time) {
  while (snowParticles.length < snowCount) snowParticles.push(createSnowParticle(true));
  while (snowParticles.length > snowCount) snowParticles.pop();

  const ox = Math.floor((W - COLS * PIXEL_SIZE) / 2);
  const oy = Math.floor((H - ROWS * PIXEL_SIZE) / 2);
  const rightEdge = ox + COLS * PIXEL_SIZE;
  const bottomEdge = oy + GROUND_Y * PIXEL_SIZE;

  for (let p of snowParticles) {
    // Horizontal: wind + sinusoidal wobble
    const wobble = Math.sin(time * p.wobbleFreq + p.wobblePhase) * p.wobbleAmp;
    const horizSpeed = p.vx + wobble;
    p.x += horizSpeed * blizzardIntensity * PIXEL_SIZE * dt * 2;

    // Vertical: falling + slight flutter
    const flutter = Math.sin(time * p.flutterFreq + p.flutterPhase) * p.flutterAmp;
    const vertSpeed = p.vy + flutter;
    p.y += vertSpeed * blizzardIntensity * PIXEL_SIZE * dt * 2;

    // Life slowly decreases
    p.life -= dt * 0.06;

    // Reset when going off bottom edge, right edge, or life runs out
    if (p.y > bottomEdge + 5 * PIXEL_SIZE || p.x > rightEdge + 10 * PIXEL_SIZE || p.life <= 0) {
      Object.assign(p, createSnowParticle(false));
    }
  }
}

function drawSnow(time) {
  for (let p of snowParticles) {
    const alpha = Math.max(0, p.life * (0.3 + p.brightness * 0.5));

    const sz = p.size * PIXEL_SIZE;
    const snapX = Math.round(p.x / PIXEL_SIZE) * PIXEL_SIZE;
    const snapY = Math.round(p.y / PIXEL_SIZE) * PIXEL_SIZE;

    // Muted snowflakes in the dark
    if (p.brightness > 0.85) {
      ctx.fillStyle = `rgba(220,230,245,${alpha * 0.9})`;
    } else {
      ctx.fillStyle = `rgba(160,180,210,${alpha * 0.7})`;
    }

    const pxW = Math.ceil(sz / PIXEL_SIZE) * PIXEL_SIZE || PIXEL_SIZE;
    const pxH = pxW; // Snow flakes are roughly square
    ctx.fillRect(snapX, snapY, pxW, pxH);
  }
}

// ============================================================
// ANIMATED OVERLAYS (wind streaks, chimney smoke, window flicker)
// ============================================================

// Chimney smoke particles (small, separate from snow system)
let smokeParticles = [];
for (let i = 0; i < 12; i++) {
  smokeParticles.push({
    x: 0, y: 0, life: Math.random(),
    phase: Math.random() * Math.PI * 2,
    speed: 0.3 + Math.random() * 0.3,
  });
}

function drawAnimatedSnowOverlay(time) {
  const ox = Math.floor((W - COLS * PIXEL_SIZE) / 2);
  const oy = Math.floor((H - ROWS * PIXEL_SIZE) / 2);

  // --- Wind streaks ---
  const layers = [
    { yBase: 10,  speed: 1.2,  freq: 0.05, amp: 1.5, alpha: 0.04 },
    { yBase: 25,  speed: 1.5,  freq: 0.07, amp: 2.0, alpha: 0.05 },
    { yBase: 40,  speed: 1.8,  freq: 0.06, amp: 1.8, alpha: 0.06 },
    { yBase: 55,  speed: 2.0,  freq: 0.08, amp: 2.5, alpha: 0.05 },
    { yBase: 70,  speed: 2.2,  freq: 0.09, amp: 2.0, alpha: 0.07 },
  ];
  for (const layer of layers) {
    if (layer.yBase >= GROUND_Y) continue;
    for (let x = 0; x < COLS; x++) {
      const waveOffset = Math.sin(x * layer.freq - time * layer.speed) * layer.amp;
      const gy = Math.round(layer.yBase + waveOffset);
      if (gy >= 0 && gy < GROUND_Y) {
        ctx.fillStyle = `rgba(220, 235, 255, ${layer.alpha * blizzardIntensity})`;
        ctx.fillRect(ox + x * PIXEL_SIZE, oy + gy * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
      }
    }
  }

  // --- Chimney smoke (warm gray wisps rising) ---
  const chimScreenX = ox + (72 + 22 - 5 + 1) * PIXEL_SIZE; // chimney center
  const chimScreenY = oy + (GROUND_Y - 16 - 6 - 5) * PIXEL_SIZE; // above chimney
  for (let sp of smokeParticles) {
    sp.life -= 0.005;
    if (sp.life <= 0) {
      sp.life = 1.0;
      sp.x = chimScreenX + (Math.random() - 0.5) * PIXEL_SIZE * 2;
      sp.y = chimScreenY;
      sp.phase = Math.random() * Math.PI * 2;
      sp.speed = 0.3 + Math.random() * 0.3;
    }
    sp.x += (Math.sin(time * 0.8 + sp.phase) * 0.3 + 0.15 * blizzardIntensity) * PIXEL_SIZE * 0.5;
    sp.y -= sp.speed * PIXEL_SIZE * 0.4;

    const alpha = sp.life * 0.15;
    const sz = (1 + (1 - sp.life) * 1.5) * PIXEL_SIZE;
    const snapX = Math.round(sp.x / PIXEL_SIZE) * PIXEL_SIZE;
    const snapY = Math.round(sp.y / PIXEL_SIZE) * PIXEL_SIZE;
    ctx.fillStyle = `rgba(180, 180, 200, ${alpha})`;
    ctx.fillRect(snapX, snapY, Math.ceil(sz / PIXEL_SIZE) * PIXEL_SIZE, Math.ceil(sz / PIXEL_SIZE) * PIXEL_SIZE);
  }

  // --- Window warm glow flicker ---
  const flicker = 0.85 + Math.sin(time * 3.7) * 0.08 + Math.sin(time * 7.3) * 0.05;
  const cabinX = 72;
  const cabinTop = GROUND_Y - 16;
  const wt = cabinTop + 4;
  // Left window flicker
  const wlx = cabinX + 2;
  ctx.fillStyle = `rgba(255, 200, 100, ${0.15 * flicker})`;
  ctx.fillRect(ox + wlx * PIXEL_SIZE, oy + wt * PIXEL_SIZE, 5 * PIXEL_SIZE, 4 * PIXEL_SIZE);
  // Right window flicker
  const wrx = cabinX + 22 - 7;
  ctx.fillStyle = `rgba(255, 200, 100, ${0.15 * flicker})`;
  ctx.fillRect(ox + wrx * PIXEL_SIZE, oy + wt * PIXEL_SIZE, 5 * PIXEL_SIZE, 4 * PIXEL_SIZE);

  // --- Lamp post glow pulse ---
  const lampPulse = 0.9 + Math.sin(time * 2.1) * 0.1;
  const lampSx = ox + 58 * PIXEL_SIZE;
  const lampSy = oy + (GROUND_Y - 18) * PIXEL_SIZE;
  ctx.fillStyle = `rgba(200, 170, 90, ${0.2 * lampPulse})`;
  ctx.fillRect(lampSx - PIXEL_SIZE, lampSy, PIXEL_SIZE * 3, PIXEL_SIZE * 3);

  // --- Ground blizzard fog (blowing snow near ground level) ---
  for (let layer = 0; layer < 3; layer++) {
    const fogY = GROUND_Y - 2 + layer * 3;
    const speed = 1.5 + layer * 0.5;
    const alpha = (0.06 - layer * 0.015) * blizzardIntensity;
    for (let x = 0; x < COLS; x++) {
      const wave = Math.sin(x * 0.03 - time * speed + layer * 2) * 2
                 + Math.sin(x * 0.08 - time * speed * 1.3) * 1;
      const gy = Math.round(fogY + wave);
      if (gy >= GROUND_Y - 4 && gy < ROWS) {
        ctx.fillStyle = `rgba(140, 155, 180, ${alpha})`;
        ctx.fillRect(ox + x * PIXEL_SIZE, oy + gy * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE * 2);
      }
    }
  }

  // --- Subtle figure breath (tiny warm wisps, only a few pixels) ---
  const figBreathX = ox + 42 * PIXEL_SIZE;
  const figBreathY = oy + (GROUND_Y - 7) * PIXEL_SIZE;
  const breathPhase = time * 0.4;
  const breathCycle = (Math.sin(breathPhase) + 1) * 0.5; // 0-1
  if (breathCycle > 0.3) {
    const ba = (breathCycle - 0.3) * 0.15;
    const boff = (breathCycle - 0.3) * PIXEL_SIZE * 4;
    ctx.fillStyle = `rgba(150, 160, 180, ${ba})`;
    ctx.fillRect(
      Math.round((figBreathX - boff * 0.3) / PIXEL_SIZE) * PIXEL_SIZE,
      Math.round((figBreathY - boff) / PIXEL_SIZE) * PIXEL_SIZE,
      PIXEL_SIZE, PIXEL_SIZE
    );
  }
}

// ============================================================
// VELOCITY LOOKUP (particle-based)
// ============================================================
let currentTime = 0;

function getSnowVelocityAt(sx, sy) {
  const ox = Math.floor((W - COLS * PIXEL_SIZE) / 2);
  const oy = Math.floor((H - ROWS * PIXEL_SIZE) / 2);

  // Snow/wind zone: entire sky area from top to ground
  const zoneLeft   = ox;
  const zoneRight  = ox + COLS * PIXEL_SIZE;
  const zoneTop    = oy;
  const zoneBottom = oy + GROUND_Y * PIXEL_SIZE;

  if (sx < zoneLeft || sx > zoneRight || sy < zoneTop || sy > zoneBottom) {
    return { vx: 0, vy: 0, inZone: false };
  }

  let totalVx = 0, totalVy = 0, weight = 0;
  const radius = 20 * PIXEL_SIZE;

  for (let p of snowParticles) {
    const dist = Math.sqrt((p.x - sx) ** 2 + (p.y - sy) ** 2);
    if (dist < radius) {
      const w = (1 - dist / radius) * p.life;
      // Instantaneous horizontal velocity (wind + wobble)
      const wobble = Math.sin(currentTime * p.wobbleFreq + p.wobblePhase) * p.wobbleAmp;
      const instVx = (p.vx + wobble) * blizzardIntensity;
      // Instantaneous vertical velocity (fall + flutter)
      const flutter = Math.sin(currentTime * p.flutterFreq + p.flutterPhase) * p.flutterAmp;
      const instVy = (p.vy + flutter) * blizzardIntensity;
      totalVx += instVx * w;
      totalVy += instVy * w;
      weight += w;
    }
  }

  if (weight > 0.01) {
    return {
      vx: (totalVx / weight) * PIXEL_SIZE,
      vy: (totalVy / weight) * PIXEL_SIZE,
      inZone: true,
    };
  }
  // Fallback: gentle rightward wind drift + slight downward
  return {
    vx: 0.5 * PIXEL_SIZE * blizzardIntensity,
    vy: 0.3 * PIXEL_SIZE * blizzardIntensity,
    inZone: true,
  };
}

// ============================================================
// PSEUDO-HAPTIC CURSOR
// ============================================================
let mouseX = 0, mouseY = 0;
let prevMouseX = 0, prevMouseY = 0;
let mouseInited = false;
let cursorX = 0, cursorY = 0;
let gain = 0.3;
let effectEnabled = true;
let showTrail = false;
let showDispLine = true;
let showFlowField = false;
let cursorTrail = [];

document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  if (!mouseInited) {
    prevMouseX = mouseX;
    prevMouseY = mouseY;
    cursorX = mouseX;
    cursorY = mouseY;
    mouseInited = true;
  }
});

function updateCursor(dt, time) {
  const dmx = mouseX - prevMouseX;
  const dmy = mouseY - prevMouseY;
  prevMouseX = mouseX;
  prevMouseY = mouseY;

  if (!effectEnabled) {
    cursorX = mouseX;
    cursorY = mouseY;
    return;
  }

  const snow = getSnowVelocityAt(cursorX, cursorY);

  if (snow.inZone) {
    cursorX += dmx + snow.vx * gain * dt * 30;
    cursorY += dmy + snow.vy * gain * dt * 30;
  } else {
    cursorX += dmx;
    cursorY += dmy;
  }

  if (showTrail) {
    cursorTrail.push({ x: cursorX, y: cursorY, t: 1.0 });
    if (cursorTrail.length > 30) cursorTrail.shift();
  }
}

function drawCursorTrail() {
  if (!showTrail) return;
  for (let i = 0; i < cursorTrail.length; i++) {
    const p = cursorTrail[i];
    p.t -= 0.03;
    if (p.t <= 0) { cursorTrail.splice(i, 1); i--; continue; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3 * p.t, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(170,220,255,${p.t * 0.5})`;
    ctx.fill();
  }
}

// ============================================================
// DISPLACEMENT VISUALIZATION
// ============================================================
function drawDisplacementLine() {
  const dx = cursorX - mouseX;
  const dy = cursorY - mouseY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist > 1 && effectEnabled && showDispLine) {
    ctx.beginPath();
    ctx.moveTo(mouseX, mouseY);
    ctx.lineTo(cursorX, cursorY);
    ctx.strokeStyle = 'rgba(255,100,100,0.4)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.beginPath();
    ctx.arc(mouseX, mouseY, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,100,100,0.5)';
    ctx.fill();
  }

  document.getElementById('disp-value').textContent = dist.toFixed(1) + ' px';
}

// ============================================================
// VELOCITY FIELD VISUALIZATION
// ============================================================
function drawVelocityField() {
  if (!showFlowField) return;

  const ox = Math.floor((W - COLS * PIXEL_SIZE) / 2);
  const oy = Math.floor((H - ROWS * PIXEL_SIZE) / 2);
  const zoneLeft   = ox;
  const zoneRight  = ox + COLS * PIXEL_SIZE;
  const zoneTop    = oy;
  const zoneBottom = oy + GROUND_Y * PIXEL_SIZE;

  const step = 5 * PIXEL_SIZE;
  const arrowScale = 8;
  const maxArrowLen = step * 0.9;

  ctx.save();
  for (let y = zoneTop + step; y <= zoneBottom - step; y += step) {
    for (let x = zoneLeft + step; x <= zoneRight - step; x += step) {
      const v = getSnowVelocityAt(x, y);
      if (!v.inZone) continue;

      const mag = Math.sqrt(v.vx * v.vx + v.vy * v.vy);
      if (mag < 0.01) continue;

      let len = mag * arrowScale;
      if (len > maxArrowLen) len = maxArrowLen;

      const nx = v.vx / mag;
      const ny = v.vy / mag;

      const tx = x + nx * len;
      const ty = y + ny * len;

      const normMag = Math.min(mag / (3 * PIXEL_SIZE), 1);
      const hue = (1 - normMag) * 240;
      const alpha = 0.4 + normMag * 0.4;

      ctx.strokeStyle = `hsla(${hue}, 90%, 60%, ${alpha})`;
      ctx.fillStyle = ctx.strokeStyle;
      ctx.lineWidth = 1.5;

      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(tx, ty);
      ctx.stroke();

      const headLen = Math.max(3, len * 0.3);
      const angle = Math.atan2(ny, nx);
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx - headLen * Math.cos(angle - 0.4), ty - headLen * Math.sin(angle - 0.4));
      ctx.lineTo(tx - headLen * Math.cos(angle + 0.4), ty - headLen * Math.sin(angle + 0.4));
      ctx.closePath();
      ctx.fill();
    }
  }
  ctx.restore();
}

// ============================================================
// UI CONTROLS
// ============================================================
document.getElementById('gain-slider').addEventListener('input', function() {
  gain = parseFloat(this.value);
  document.getElementById('gain-val').textContent = gain.toFixed(1);
});
document.getElementById('wave-slider').addEventListener('input', function() {
  blizzardIntensity = parseFloat(this.value);
  document.getElementById('wave-val').textContent = blizzardIntensity.toFixed(1);
});
document.getElementById('count-slider').addEventListener('input', function() {
  snowCount = parseInt(this.value);
  document.getElementById('count-val').textContent = snowCount;
});
document.getElementById('toggle-effect').addEventListener('change', function() {
  effectEnabled = this.checked;
});
document.getElementById('toggle-trail').addEventListener('change', function() {
  showTrail = this.checked;
  if (!showTrail) cursorTrail = [];
});
document.getElementById('toggle-displine').addEventListener('change', function() {
  showDispLine = this.checked;
});
document.getElementById('toggle-flowfield').addEventListener('change', function() {
  showFlowField = this.checked;
});

// ============================================================
// MAIN LOOP
// ============================================================
let lastTime = 0;

function loop(timestamp) {
  const time = timestamp / 1000;
  const dt = Math.min(time - lastTime, 0.05);
  lastTime = time;

  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(sceneCanvas, 0, 0);

  currentTime = time;
  drawAnimatedSnowOverlay(time);
  updateSnow(dt, time);
  drawSnow(time);
  drawVelocityField();
  updateCursor(dt, time);
  drawDisplacementLine();
  drawCursorTrail();

  cursorEl.style.left = (cursorX - 2) + 'px';
  cursorEl.style.top = (cursorY - 2) + 'px';

  requestAnimationFrame(loop);
}

window.addEventListener('resize', () => {
  resize();
  buildScene();
  initSnow();
});

buildScene();
requestAnimationFrame(loop);
</script>
