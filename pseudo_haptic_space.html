<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pseudo-Haptic Pixel Art - Deep Space / Loneliness</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020204;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: none;
  }
  #main-canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: none;
  }
  #custom-cursor {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    width: 16px;
    height: 24px;
    transition: none;
  }
  #cursor-arrow { position: absolute; top: 0; left: 0; }
  #controls {
    position: fixed;
    top: 12px;
    right: 12px;
    background: rgba(2, 2, 4, 0.94);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 13px;
    line-height: 1.7;
    max-width: 310px;
    z-index: 500;
  }
  #controls h3 {
    font-size: 14px;
    margin-bottom: 8px;
    color: #8866aa;
    border-bottom: 1px solid #333;
    padding-bottom: 4px;
  }
  #controls label {
    display: flex; align-items: center; gap: 8px; margin: 6px 0;
  }
  #controls input[type="range"] { width: 120px; accent-color: #8866aa; }
  #controls .val { color: #8866aa; min-width: 32px; text-align: right; }
  .info-badge {
    position: fixed;
    bottom: 12px;
    left: 12px;
    background: rgba(2, 2, 4, 0.92);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 12px;
    line-height: 1.6;
    z-index: 500;
    max-width: 400px;
  }
  .info-badge .title { color: #8866aa; font-weight: bold; }
  .info-badge .subtle { color: #666; }
  #displacement-indicator {
    position: fixed;
    top: 12px;
    left: 12px;
    background: rgba(2, 2, 4, 0.92);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    z-index: 500;
  }
  #displacement-indicator .label { color: #666; }
  #displacement-indicator .value { color: #884444; font-weight: bold; }
  .toggle-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .toggle-row input[type="checkbox"] { accent-color: #8866aa; }
</style>
</head>
<body>

<canvas id="main-canvas"></canvas>

<div id="custom-cursor">
  <svg id="cursor-arrow" width="16" height="24" viewBox="0 0 16 24">
    <polygon points="1,1 1,19 5.5,15 9,22 12,20.5 8,14 14,12"
             fill="white" stroke="#333" stroke-width="1.2"/>
  </svg>
</div>

<div id="controls">
  <h3>Parameters</h3>
  <label>
    Gain (C/D ratio)
    <input type="range" id="gain-slider" min="0" max="10" step="0.1" value="0.3">
    <span class="val" id="gain-val">0.3</span>
  </label>
  <label>
    Cosmic wind
    <input type="range" id="wave-slider" min="0.2" max="2" step="0.1" value="1.0">
    <span class="val" id="wave-val">1.0</span>
  </label>
  <label>
    Stardust count
    <input type="range" id="count-slider" min="10" max="120" step="5" value="50">
    <span class="val" id="count-val">50</span>
  </label>
  <div class="toggle-row">
    <input type="checkbox" id="toggle-effect" checked>
    <label for="toggle-effect">Enable pseudo-haptic effect</label>
  </div>
  <div class="toggle-row">
    <input type="checkbox" id="toggle-trail">
    <label for="toggle-trail">Show cursor trail</label>
  </div>
  <div class="toggle-row">
    <input type="checkbox" id="toggle-displine" checked>
    <label for="toggle-displine">Show displacement line</label>
  </div>
  <div class="toggle-row">
    <input type="checkbox" id="toggle-flowfield">
    <label for="toggle-flowfield">Show velocity field</label>
  </div>
</div>

<div id="displacement-indicator">
  <span class="label">Cursor displacement: </span>
  <span class="value" id="disp-value">0.0 px</span>
</div>

<div class="info-badge">
  <div class="title">Pseudo-Haptic Pixel Art Demo — Deep Space</div>
  <div>宇宙の深淵でカーソルを動かすと、<br>
  はるか遠い星々の引力にゆっくりと流されていきます。</div>
  <div class="subtle">パーティクルシステムで星屑を生成し、視覚的カーソル変位で疑似力覚を提示</div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const PIXEL_SIZE = 6;
const COLS = 160;
const ROWS = 120;

const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('custom-cursor');

let W, H;
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
}
resize();
window.addEventListener('resize', resize);

// ============================================================
// PALETTE — Deep void, dying star, loneliness
// ============================================================
const PAL = {
  // The void — oppressive, true black
  spaceBlack:    '#020204',
  spaceDark:     '#030308',
  spaceMid:      '#05050c',
  // Stars — dim and scarce
  starWhite:     '#888899',
  starBlue:      '#556677',
  starYellow:    '#887766',
  starDimWhite:  '#333344',
  starDimBlue:   '#222233',
  // Nebula — faded, ghostly memory
  nebPurple:     '#1a0e2a',
  nebPurpleLight:'#2a1840',
  nebBlue:       '#0e1428',
  nebBlueLight:  '#162038',
  // Planet — distant, unreachable
  planetBase:    '#443322',
  planetLight:   '#554433',
  planetBand1:   '#3d2e1e',
  planetBand2:   '#4d3e2e',
  planetBand3:   '#332211',
  planetBand4:   '#554430',
  planetShadow:  '#221100',
  planetRing:    '#44382e',
  planetRingLight:'#554840',
  // Dying star
  dyingStarCore: '#441818',
  dyingStarMid:  '#331010',
  dyingStarOuter:'#220808',
  dyingStarGlow: '#2a0e0e',
  // Spacecraft
  craftBody:     '#334455',
  craftLight:    '#445566',
  craftWindow:   '#cc8822',
  craftAntenna:  '#556666',
  // Earth — pale blue dot
  earthBlue:     '#4466aa',
  earthPale:     '#334488',
  // Asteroid debris
  asteroidDark:  '#181818',
  asteroidMid:   '#222222',
  asteroidLight: '#2a2a2a',
};

// ============================================================
// PIXEL ART SCENE — The loneliness of deep space
// ============================================================
const sceneCanvas = document.createElement('canvas');
const sceneCtx = sceneCanvas.getContext('2d');

// Planet center — pushed far away (smaller, dimmer)
const PLANET_CX = 130;
const PLANET_CY = 38;
const PLANET_R = 7;  // Much smaller — feels distant

// Dying star position
const DYING_STAR_CX = 45;
const DYING_STAR_CY = 60;
const DYING_STAR_R = 9;

// Spacecraft position — the emotional anchor
const CRAFT_X = 88;
const CRAFT_Y = 70;

// Earth — pale blue dot, impossibly far
const EARTH_X = 22;
const EARTH_Y = 28;
const EARTH_R = 3;

// Shooting star state
let shootingStar = null;
let shootingStarTimer = 0;
const SHOOTING_STAR_INTERVAL_MIN = 5;
const SHOOTING_STAR_INTERVAL_MAX = 10;
let nextShootingStarTime = SHOOTING_STAR_INTERVAL_MIN + Math.random() * (SHOOTING_STAR_INTERVAL_MAX - SHOOTING_STAR_INTERVAL_MIN);

// Seeded pseudo-random for deterministic star placement
let _seed = 12345;
function seededRandom() {
  _seed = (_seed * 16807 + 0) % 2147483647;
  return (_seed & 0x7fffffff) / 2147483647;
}

function drawPixel(sctx, gx, gy, color) {
  const ox = Math.floor((W - COLS * PIXEL_SIZE) / 2);
  const oy = Math.floor((H - ROWS * PIXEL_SIZE) / 2);
  sctx.fillStyle = color;
  sctx.fillRect(ox + gx * PIXEL_SIZE, oy + gy * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
}

function drawRect(sctx, gx, gy, gw, gh, color) {
  const ox = Math.floor((W - COLS * PIXEL_SIZE) / 2);
  const oy = Math.floor((H - ROWS * PIXEL_SIZE) / 2);
  sctx.fillStyle = color;
  sctx.fillRect(ox + gx * PIXEL_SIZE, oy + gy * PIXEL_SIZE, gw * PIXEL_SIZE, gh * PIXEL_SIZE);
}

function lerpColor(c1, c2, t) {
  const r1 = parseInt(c1.slice(1, 3), 16), g1 = parseInt(c1.slice(3, 5), 16), b1 = parseInt(c1.slice(5, 7), 16);
  const r2 = parseInt(c2.slice(1, 3), 16), g2 = parseInt(c2.slice(3, 5), 16), b2 = parseInt(c2.slice(5, 7), 16);
  const r = Math.round(r1 + (r2 - r1) * t);
  const g = Math.round(g1 + (g2 - g1) * t);
  const b = Math.round(b1 + (b2 - b1) * t);
  return `rgb(${r},${g},${b})`;
}

function buildScene() {
  sceneCanvas.width = W;
  sceneCanvas.height = H;
  const s = sceneCtx;
  _seed = 12345;

  const ox = Math.floor((W - COLS * PIXEL_SIZE) / 2);
  const oy = Math.floor((H - ROWS * PIXEL_SIZE) / 2);

  // --- The Void — oppressive deep space background ---
  for (let y = 0; y < ROWS; y++) {
    const t = y / ROWS;
    const color = lerpColor(PAL.spaceMid, PAL.spaceBlack, t * 0.3 + 0.6);
    drawRect(s, 0, y, COLS, 1, color);
  }

  // --- Single faded nebula — a distant memory of gas and light ---
  const nebulae = [
    // Primary: ghostly purple/blue, upper-left area — very subtle
    { cx: 40, cy: 35, rx: 28, ry: 18, colors: [
      { r: 26, g: 14, b: 42, a: 0.06 },
      { r: 36, g: 24, b: 56, a: 0.035 },
      { r: 14, g: 20, b: 40, a: 0.02 },
    ]},
    // Ghost: barely perceptible blue wisp, lower right — almost invisible
    { cx: 125, cy: 95, rx: 18, ry: 12, colors: [
      { r: 14, g: 20, b: 40, a: 0.025 },
      { r: 20, g: 28, b: 50, a: 0.015 },
    ]},
  ];

  for (const neb of nebulae) {
    for (let layer = 0; layer < neb.colors.length; layer++) {
      const col = neb.colors[layer];
      const scale = 1.0 + layer * 0.5;
      for (let dy = -Math.ceil(neb.ry * scale); dy <= Math.ceil(neb.ry * scale); dy++) {
        for (let dx = -Math.ceil(neb.rx * scale); dx <= Math.ceil(neb.rx * scale); dx++) {
          const nx = dx / (neb.rx * scale);
          const ny = dy / (neb.ry * scale);
          const dist = nx * nx + ny * ny;
          if (dist < 1.0) {
            const gx = neb.cx + dx;
            const gy = neb.cy + dy;
            if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) continue;
            const hash = Math.sin(gx * 127.1 + gy * 311.7) * 43758.5453;
            const noise = hash - Math.floor(hash);
            if (noise > 0.4) {
              const falloff = (1.0 - dist);
              const alpha = col.a * falloff * (0.4 + noise * 0.4);
              s.fillStyle = `rgba(${col.r},${col.g},${col.b},${alpha})`;
              s.fillRect(ox + gx * PIXEL_SIZE, oy + gy * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
            }
          }
        }
      }
    }
  }

  // --- Stars — drastically reduced. Space is EMPTY. ---
  // Only ~60 dim stars (was 300) — most of the view is pure void
  const starColors = [
    PAL.starDimWhite, PAL.starDimWhite, PAL.starDimWhite, PAL.starDimWhite,
    PAL.starDimBlue, PAL.starDimBlue, PAL.starDimBlue,
    PAL.starWhite,
    PAL.starBlue,
    PAL.starYellow,
  ];

  for (let i = 0; i < 60; i++) {
    const sx = Math.floor(seededRandom() * COLS);
    const sy = Math.floor(seededRandom() * ROWS);
    // Avoid placing on objects
    const pdx = sx - PLANET_CX;
    const pdy = sy - PLANET_CY;
    if (Math.sqrt(pdx * pdx + pdy * pdy) < PLANET_R + 3) continue;
    const ddx = sx - DYING_STAR_CX;
    const ddy = sy - DYING_STAR_CY;
    if (Math.sqrt(ddx * ddx + ddy * ddy) < DYING_STAR_R + 3) continue;
    const color = starColors[Math.floor(seededRandom() * starColors.length)];
    const alpha = 0.15 + seededRandom() * 0.4;  // Much dimmer
    const r = parseInt(color.slice(1, 3), 16);
    const g = parseInt(color.slice(3, 5), 16);
    const b = parseInt(color.slice(5, 7), 16);
    s.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    s.fillRect(ox + sx * PIXEL_SIZE, oy + sy * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
  }

  // --- Only 2 barely-brighter stars (was 7) — the void is vast ---
  const brightStars = [
    { x: 75, y: 8, color: PAL.starBlue },
    { x: 140, y: 105, color: PAL.starWhite },
  ];
  for (const bs of brightStars) {
    const r = parseInt(bs.color.slice(1, 3), 16);
    const g = parseInt(bs.color.slice(3, 5), 16);
    const b = parseInt(bs.color.slice(5, 7), 16);
    s.fillStyle = `rgba(${r},${g},${b},0.5)`;
    s.fillRect(ox + bs.x * PIXEL_SIZE, oy + bs.y * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
    // Very faint glow
    for (let ddy = -1; ddy <= 1; ddy++) {
      for (let ddx = -1; ddx <= 1; ddx++) {
        if (ddx === 0 && ddy === 0) continue;
        const gx = bs.x + ddx;
        const gy = bs.y + ddy;
        if (gx >= 0 && gx < COLS && gy >= 0 && gy < ROWS) {
          s.fillStyle = `rgba(${r},${g},${b},0.06)`;
          s.fillRect(ox + gx * PIXEL_SIZE, oy + gy * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
        }
      }
    }
  }

  // --- Dying Star — old, fading, red-orange ---
  // Core
  for (let dy = -DYING_STAR_R; dy <= DYING_STAR_R; dy++) {
    for (let dx = -DYING_STAR_R; dx <= DYING_STAR_R; dx++) {
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist <= DYING_STAR_R) {
        const gx = DYING_STAR_CX + dx;
        const gy = DYING_STAR_CY + dy;
        const normDist = dist / DYING_STAR_R;
        // Gradient from core to edge
        if (normDist < 0.3) {
          drawPixel(s, gx, gy, PAL.dyingStarCore);
        } else if (normDist < 0.6) {
          drawPixel(s, gx, gy, PAL.dyingStarMid);
        } else if (normDist < 0.85) {
          drawPixel(s, gx, gy, PAL.dyingStarOuter);
        } else {
          // Edge — barely visible
          const alpha = 0.3 * (1.0 - normDist);
          s.fillStyle = `rgba(34,8,8,${alpha})`;
          s.fillRect(ox + gx * PIXEL_SIZE, oy + gy * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
        }
      }
    }
  }
  // Faint glow around dying star
  for (let dy = -(DYING_STAR_R + 4); dy <= DYING_STAR_R + 4; dy++) {
    for (let dx = -(DYING_STAR_R + 4); dx <= DYING_STAR_R + 4; dx++) {
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > DYING_STAR_R && dist <= DYING_STAR_R + 4) {
        const gx = DYING_STAR_CX + dx;
        const gy = DYING_STAR_CY + dy;
        if (gx >= 0 && gx < COLS && gy >= 0 && gy < ROWS) {
          const falloff = 1.0 - (dist - DYING_STAR_R) / 4;
          const alpha = 0.04 * falloff;
          s.fillStyle = `rgba(68,24,24,${alpha})`;
          s.fillRect(ox + gx * PIXEL_SIZE, oy + gy * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
        }
      }
    }
  }

  // --- Planet — pushed far away, small, dim, unreachable ---
  // Faint ring of debris/atmosphere
  for (let angle = 0; angle < Math.PI * 2; angle += 0.02) {
    const ringRx = PLANET_R + 4;
    const ringRy = 1.5;
    const rx = Math.round(PLANET_CX + Math.cos(angle) * ringRx);
    const ry = Math.round(PLANET_CY + Math.sin(angle) * ringRy);
    if (rx >= 0 && rx < COLS && ry >= 0 && ry < ROWS) {
      const pdist = Math.sqrt((rx - PLANET_CX) ** 2 + (ry - PLANET_CY) ** 2);
      if (pdist > PLANET_R) {
        const alpha = 0.12 + 0.08 * Math.sin(angle * 3);
        s.fillStyle = `rgba(68,56,46,${alpha})`;
        s.fillRect(ox + rx * PIXEL_SIZE, oy + ry * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
      }
    }
  }

  // Planet body — dimmer bands
  const bandColors = [PAL.planetBase, PAL.planetBand1, PAL.planetBand2, PAL.planetBand3, PAL.planetBand4, PAL.planetLight];
  for (let dy = -PLANET_R; dy <= PLANET_R; dy++) {
    for (let dx = -PLANET_R; dx <= PLANET_R; dx++) {
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist <= PLANET_R) {
        const gx = PLANET_CX + dx;
        const gy = PLANET_CY + dy;
        const bandIdx = Math.abs(Math.floor((dy + PLANET_R) * bandColors.length / (PLANET_R * 2 + 1))) % bandColors.length;
        let color = bandColors[bandIdx];
        const hash = Math.sin(gx * 73.1 + gy * 199.3) * 43758.5453;
        const noise = hash - Math.floor(hash);
        if (noise > 0.75) {
          color = PAL.planetLight;
        }
        // Heavy shadow — light from the dying star (left side)
        const shadowFactor = Math.max(0, dx / PLANET_R);
        drawPixel(s, gx, gy, color);
        // Overall dimming — planet feels far away
        s.fillStyle = `rgba(2,2,4,0.35)`;
        s.fillRect(ox + gx * PIXEL_SIZE, oy + gy * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
        if (shadowFactor > 0.3) {
          const alpha = (shadowFactor - 0.3) * 0.5;
          s.fillStyle = `rgba(0,0,0,${alpha})`;
          s.fillRect(ox + gx * PIXEL_SIZE, oy + gy * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
        }
      }
    }
  }

  // --- Spacecraft — tiny human presence in the infinite void ---
  // Body: 4x2 pixel capsule
  drawPixel(s, CRAFT_X, CRAFT_Y, PAL.craftBody);
  drawPixel(s, CRAFT_X + 1, CRAFT_Y, PAL.craftLight);
  drawPixel(s, CRAFT_X + 2, CRAFT_Y, PAL.craftLight);
  drawPixel(s, CRAFT_X + 3, CRAFT_Y, PAL.craftBody);
  drawPixel(s, CRAFT_X, CRAFT_Y + 1, PAL.craftBody);
  drawPixel(s, CRAFT_X + 1, CRAFT_Y + 1, PAL.craftBody);
  drawPixel(s, CRAFT_X + 2, CRAFT_Y + 1, PAL.craftBody);
  drawPixel(s, CRAFT_X + 3, CRAFT_Y + 1, PAL.craftBody);

  // Window — warm amber light (the emotional core, 2 pixels)
  drawPixel(s, CRAFT_X + 1, CRAFT_Y, PAL.craftWindow);
  drawPixel(s, CRAFT_X + 2, CRAFT_Y, '#aa7718');

  // Antenna — thin line upward
  drawPixel(s, CRAFT_X, CRAFT_Y - 1, PAL.craftAntenna);
  drawPixel(s, CRAFT_X, CRAFT_Y - 2, PAL.craftAntenna);
  // Antenna tip
  s.fillStyle = 'rgba(100,140,140,0.6)';
  s.fillRect(ox + (CRAFT_X - 1) * PIXEL_SIZE, oy + (CRAFT_Y - 2) * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);

  // Solar panel — extends right
  drawPixel(s, CRAFT_X + 4, CRAFT_Y, '#2a3344');
  drawPixel(s, CRAFT_X + 5, CRAFT_Y, '#223344');
  // Solar panel extends down slightly
  drawPixel(s, CRAFT_X + 4, CRAFT_Y + 1, '#223344');
  drawPixel(s, CRAFT_X + 5, CRAFT_Y + 1, '#1a2a3a');

  // --- Earth — Pale Blue Dot ---
  // "Look again at that dot. That's here. That's home. That's us."
  for (let dy = -EARTH_R; dy <= EARTH_R; dy++) {
    for (let dx = -EARTH_R; dx <= EARTH_R; dx++) {
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist <= EARTH_R) {
        const gx = EARTH_X + dx;
        const gy = EARTH_Y + dy;
        const normDist = dist / EARTH_R;
        // Very faint — barely visible
        const alpha = 0.25 * (1.0 - normDist * 0.4);
        s.fillStyle = `rgba(68,102,170,${alpha})`;
        s.fillRect(ox + gx * PIXEL_SIZE, oy + gy * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
      }
    }
  }
  // Faintest glow around Earth
  for (let dy = -(EARTH_R + 1); dy <= EARTH_R + 1; dy++) {
    for (let dx = -(EARTH_R + 1); dx <= EARTH_R + 1; dx++) {
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > EARTH_R && dist <= EARTH_R + 1.5) {
        const gx = EARTH_X + dx;
        const gy = EARTH_Y + dy;
        if (gx >= 0 && gx < COLS && gy >= 0 && gy < ROWS) {
          s.fillStyle = `rgba(68,102,170,0.04)`;
          s.fillRect(ox + gx * PIXEL_SIZE, oy + gy * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
        }
      }
    }
  }

  // --- Sparse debris — a few dark motes floating ---
  for (let i = 0; i < 12; i++) {
    const t = seededRandom();
    const bx = Math.floor(20 + t * 120);
    const by = Math.floor(70 + (t * 30) + (seededRandom() - 0.5) * 15);
    if (bx >= 0 && bx < COLS && by >= 0 && by < ROWS) {
      const pdx = bx - PLANET_CX;
      const pdy = by - PLANET_CY;
      if (Math.sqrt(pdx * pdx + pdy * pdy) < PLANET_R + 4) continue;
      const colors = [PAL.asteroidDark, PAL.asteroidMid];
      const color = colors[Math.floor(seededRandom() * colors.length)];
      drawPixel(s, bx, by, color);
    }
  }
}

// ============================================================
// ANIMATED OVERLAYS — Spacecraft window, Earth twinkle, Dying star
// ============================================================
function drawAnimatedElements(time) {
  const ox = Math.floor((W - COLS * PIXEL_SIZE) / 2);
  const oy = Math.floor((H - ROWS * PIXEL_SIZE) / 2);

  // --- Spacecraft window warm pulse ---
  // Barely visible amber flicker — suggesting life inside
  const windowPulse = 0.4 + 0.15 * Math.sin(time * 1.2) + 0.1 * Math.sin(time * 2.7 + 1.3);
  ctx.fillStyle = `rgba(204,136,34,${windowPulse * 0.3})`;
  ctx.fillRect(ox + (CRAFT_X + 1) * PIXEL_SIZE, oy + CRAFT_Y * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
  ctx.fillStyle = `rgba(170,119,24,${windowPulse * 0.2})`;
  ctx.fillRect(ox + (CRAFT_X + 2) * PIXEL_SIZE, oy + CRAFT_Y * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
  // Window light spill — tiny warm glow below the craft
  ctx.fillStyle = `rgba(204,136,34,${windowPulse * 0.03})`;
  ctx.fillRect(ox + (CRAFT_X + 1) * PIXEL_SIZE, oy + (CRAFT_Y + 2) * PIXEL_SIZE, PIXEL_SIZE * 2, PIXEL_SIZE);

  // --- Earth twinkle — the pale blue dot occasionally glints ---
  const earthGlint = Math.sin(time * 0.4) * Math.sin(time * 0.7 + 2.1);
  if (earthGlint > 0.7) {
    const glintAlpha = (earthGlint - 0.7) * 0.5;
    ctx.fillStyle = `rgba(100,140,220,${glintAlpha})`;
    ctx.fillRect(ox + EARTH_X * PIXEL_SIZE, oy + EARTH_Y * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
  }

  // --- Dying star slow throb ---
  const starPulse = 0.7 + 0.3 * Math.sin(time * 0.25);
  // Subtle pulsing glow around the star
  for (let dy = -(DYING_STAR_R + 2); dy <= DYING_STAR_R + 2; dy++) {
    for (let dx = -(DYING_STAR_R + 2); dx <= DYING_STAR_R + 2; dx++) {
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > DYING_STAR_R - 1 && dist <= DYING_STAR_R + 2) {
        const gx = DYING_STAR_CX + dx;
        const gy = DYING_STAR_CY + dy;
        if (gx >= 0 && gx < COLS && gy >= 0 && gy < ROWS) {
          const falloff = 1.0 - (dist - DYING_STAR_R + 1) / 3;
          const alpha = 0.025 * falloff * starPulse;
          ctx.fillStyle = `rgba(68,24,24,${alpha})`;
          ctx.fillRect(ox + gx * PIXEL_SIZE, oy + gy * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
        }
      }
    }
  }
  // Core flicker
  const coreFlicker = starPulse * (0.9 + 0.1 * Math.sin(time * 3.7));
  ctx.fillStyle = `rgba(68,24,24,${0.08 * coreFlicker})`;
  ctx.fillRect(
    ox + (DYING_STAR_CX - 2) * PIXEL_SIZE,
    oy + (DYING_STAR_CY - 2) * PIXEL_SIZE,
    PIXEL_SIZE * 5,
    PIXEL_SIZE * 5
  );

  // --- Shooting star — very rare, a single brief streak ---
  shootingStarTimer += 1/60;
  if (!shootingStar && shootingStarTimer >= nextShootingStarTime) {
    // Launch a shooting star
    const startX = Math.random() * COLS * 0.6 + COLS * 0.2;
    const startY = Math.random() * ROWS * 0.3;
    const angle = Math.PI * 0.2 + Math.random() * 0.3;
    shootingStar = {
      x: startX,
      y: startY,
      vx: Math.cos(angle) * 2.5,
      vy: Math.sin(angle) * 2.5,
      life: 1.0,
      trail: [],
    };
    shootingStarTimer = 0;
    nextShootingStarTime = SHOOTING_STAR_INTERVAL_MIN + Math.random() * (SHOOTING_STAR_INTERVAL_MAX - SHOOTING_STAR_INTERVAL_MIN);
  }

  if (shootingStar) {
    const ss = shootingStar;
    ss.trail.push({ x: ss.x, y: ss.y, a: ss.life });
    if (ss.trail.length > 12) ss.trail.shift();

    ss.x += ss.vx;
    ss.y += ss.vy;
    ss.life -= 0.04;

    // Draw trail
    for (let i = 0; i < ss.trail.length; i++) {
      const tr = ss.trail[i];
      const alpha = tr.a * (i / ss.trail.length) * 0.3;
      if (alpha > 0.01) {
        ctx.fillStyle = `rgba(180,180,200,${alpha})`;
        ctx.fillRect(
          ox + Math.round(tr.x) * PIXEL_SIZE,
          oy + Math.round(tr.y) * PIXEL_SIZE,
          PIXEL_SIZE, PIXEL_SIZE
        );
      }
    }
    // Draw head
    ctx.fillStyle = `rgba(200,200,220,${ss.life * 0.5})`;
    ctx.fillRect(
      ox + Math.round(ss.x) * PIXEL_SIZE,
      oy + Math.round(ss.y) * PIXEL_SIZE,
      PIXEL_SIZE, PIXEL_SIZE
    );

    if (ss.life <= 0 || ss.x > COLS || ss.y > ROWS || ss.x < 0) {
      shootingStar = null;
    }
  }
}

// ============================================================
// HEAVY VIGNETTE — the void closes in from all sides
// ============================================================
function drawVignette() {
  const ox = Math.floor((W - COLS * PIXEL_SIZE) / 2);
  const oy = Math.floor((H - ROWS * PIXEL_SIZE) / 2);
  const sceneW = COLS * PIXEL_SIZE;
  const sceneH = ROWS * PIXEL_SIZE;
  const cx = ox + sceneW / 2;
  const cy = oy + sceneH / 2;
  const maxR = Math.sqrt(sceneW * sceneW + sceneH * sceneH) / 2;

  // Radial gradient vignette — very heavy
  const grad = ctx.createRadialGradient(cx, cy, maxR * 0.2, cx, cy, maxR * 0.85);
  grad.addColorStop(0, 'rgba(2,2,4,0)');
  grad.addColorStop(0.3, 'rgba(2,2,4,0.05)');
  grad.addColorStop(0.55, 'rgba(2,2,4,0.2)');
  grad.addColorStop(0.7, 'rgba(2,2,4,0.45)');
  grad.addColorStop(0.85, 'rgba(2,2,4,0.72)');
  grad.addColorStop(1.0, 'rgba(2,2,4,0.92)');
  ctx.fillStyle = grad;
  ctx.fillRect(ox, oy, sceneW, sceneH);

  // Fill outside the scene area with true black
  ctx.fillStyle = '#020204';
  ctx.fillRect(0, 0, W, oy);
  ctx.fillRect(0, oy + sceneH, W, H - oy - sceneH);
  ctx.fillRect(0, oy, ox, sceneH);
  ctx.fillRect(ox + sceneW, oy, W - ox - sceneW, sceneH);
}

// ============================================================
// PARTICLES (Star dust / Cosmic wind) — sparser, slower, aimless
// ============================================================
let particles = [];
let particleCount = 50;
let windIntensity = 1.0;

// Nebula zones for gas resistance
const nebulaZones = [
  { cx: 40, cy: 35, rx: 28, ry: 18 },
  { cx: 125, cy: 95, rx: 18, ry: 12 },
];

function isInNebula(gx, gy) {
  for (const neb of nebulaZones) {
    const nx = (gx - neb.cx) / neb.rx;
    const ny = (gy - neb.cy) / neb.ry;
    if (nx * nx + ny * ny < 1.0) return true;
  }
  return false;
}

function createParticle(randomPos = false) {
  const ox = Math.floor((W - COLS * PIXEL_SIZE) / 2);
  const oy = Math.floor((H - ROWS * PIXEL_SIZE) / 2);

  let xGrid, yGrid;
  if (randomPos) {
    xGrid = Math.random() * COLS;
    yGrid = Math.random() * ROWS;
  } else {
    if (Math.random() < 0.6) {
      xGrid = -2 - Math.random() * 5;
      yGrid = Math.random() * ROWS;
    } else {
      xGrid = Math.random() * COLS;
      yGrid = -2 - Math.random() * 5;
    }
  }

  // Much slower — drifting like motes in still air
  const speed = 0.1 + Math.random() * 0.2;
  const angle = Math.PI * 0.3 + (Math.random() - 0.5) * 0.6;

  // Muted, dim color palette — lonely drifting motes
  const colorChoices = [
    { r: 120, g: 120, b: 140 },  // dim gray-blue
    { r: 120, g: 120, b: 140 },  // dim gray-blue (more common)
    { r: 100, g: 110, b: 140 },  // muted blue
    { r: 100, g: 100, b: 120 },  // dark mote
    { r: 140, g: 120, b: 100 },  // faint warm (from dying star)
    { r: 80, g: 80, b: 100 },    // nearly invisible
  ];
  const col = colorChoices[Math.floor(Math.random() * colorChoices.length)];

  return {
    x: ox + xGrid * PIXEL_SIZE,
    y: oy + yGrid * PIXEL_SIZE,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    baseVx: Math.cos(angle) * speed,
    baseVy: Math.sin(angle) * speed,
    life: randomPos ? Math.random() : 1.0,
    size: 0.4 + Math.random() * 0.8,  // Smaller
    twinklePhase: Math.random() * Math.PI * 2,
    twinkleFreq: 0.5 + Math.random() * 1.5,  // Slower twinkle
    hasTrail: Math.random() < 0.15,  // Fewer trails
    trail: [],
    color: col,
    swirlSensitivity: 0.5 + Math.random() * 0.5,
  };
}

function initParticles() {
  particles = [];
  for (let i = 0; i < particleCount; i++) particles.push(createParticle(true));
}
initParticles();

function updateParticles(dt, time) {
  while (particles.length < particleCount) particles.push(createParticle(true));
  while (particles.length > particleCount) particles.pop();

  const ox = Math.floor((W - COLS * PIXEL_SIZE) / 2);
  const oy = Math.floor((H - ROWS * PIXEL_SIZE) / 2);
  const rightEdge = ox + COLS * PIXEL_SIZE;
  const bottomEdge = oy + ROWS * PIXEL_SIZE;

  // Planet screen position
  const planetSx = ox + PLANET_CX * PIXEL_SIZE;
  const planetSy = oy + PLANET_CY * PIXEL_SIZE;
  const planetSr = PLANET_R * PIXEL_SIZE;

  // Dying star as secondary gravity source
  const starSx = ox + DYING_STAR_CX * PIXEL_SIZE;
  const starSy = oy + DYING_STAR_CY * PIXEL_SIZE;
  const starSr = DYING_STAR_R * PIXEL_SIZE;

  for (let p of particles) {
    const gx = (p.x - ox) / PIXEL_SIZE;
    const gy = (p.y - oy) / PIXEL_SIZE;

    let speedMult = 1.0;
    if (isInNebula(gx, gy)) {
      speedMult = 0.3;
    }

    // Gravitational pull toward planet
    const pdx = planetSx - p.x;
    const pdy = planetSy - p.y;
    const pdist = Math.sqrt(pdx * pdx + pdy * pdy);
    let gravVx = 0, gravVy = 0;
    if (pdist > planetSr && pdist < planetSr * 6) {
      const gravStrength = 1.5 / (pdist / PIXEL_SIZE);
      gravVx = (pdx / pdist) * gravStrength * p.swirlSensitivity;
      gravVy = (pdy / pdist) * gravStrength * p.swirlSensitivity;
      gravVx += (-pdy / pdist) * gravStrength * 0.3 * p.swirlSensitivity;
      gravVy += (pdx / pdist) * gravStrength * 0.3 * p.swirlSensitivity;
    }

    // Gravitational pull toward dying star
    const sdx = starSx - p.x;
    const sdy = starSy - p.y;
    const sdist = Math.sqrt(sdx * sdx + sdy * sdy);
    if (sdist > starSr && sdist < starSr * 8) {
      const gravStrength = 2.0 / (sdist / PIXEL_SIZE);
      gravVx += (sdx / sdist) * gravStrength * p.swirlSensitivity * 0.5;
      gravVy += (sdy / sdist) * gravStrength * p.swirlSensitivity * 0.5;
    }

    p.vx = p.baseVx * speedMult * windIntensity + gravVx;
    p.vy = p.baseVy * speedMult * windIntensity + gravVy;

    // Slower movement
    p.x += p.vx * PIXEL_SIZE * dt * 1.2;
    p.y += p.vy * PIXEL_SIZE * dt * 1.2;

    if (p.hasTrail) {
      p.trail.push({ x: p.x, y: p.y, a: 0.2 });
      if (p.trail.length > 6) p.trail.shift();
      for (let tr of p.trail) tr.a *= 0.9;
    }

    p.life -= dt * 0.04;  // Slower decay

    if (p.x > rightEdge + 10 * PIXEL_SIZE || p.y > bottomEdge + 10 * PIXEL_SIZE ||
        p.x < ox - 20 * PIXEL_SIZE || p.y < oy - 20 * PIXEL_SIZE || p.life <= 0) {
      Object.assign(p, createParticle(false));
    }
  }
}

function drawParticles(time) {
  for (let p of particles) {
    const twinkle = 0.5 + 0.5 * Math.sin(time * p.twinkleFreq + p.twinklePhase);
    const alpha = Math.max(0, p.life * (0.1 + twinkle * 0.3));  // Much dimmer

    const sz = p.size * PIXEL_SIZE * (0.5 + twinkle * 0.3);
    const snapX = Math.round(p.x / PIXEL_SIZE) * PIXEL_SIZE;
    const snapY = Math.round(p.y / PIXEL_SIZE) * PIXEL_SIZE;

    if (p.hasTrail && p.trail.length > 1) {
      for (let i = 0; i < p.trail.length; i++) {
        const tr = p.trail[i];
        if (tr.a < 0.02) continue;
        const tsx = Math.round(tr.x / PIXEL_SIZE) * PIXEL_SIZE;
        const tsy = Math.round(tr.y / PIXEL_SIZE) * PIXEL_SIZE;
        ctx.fillStyle = `rgba(${p.color.r},${p.color.g},${p.color.b},${tr.a * alpha})`;
        const tsz = Math.max(PIXEL_SIZE * 0.4, sz * (i / p.trail.length) * 0.4);
        ctx.fillRect(tsx, tsy, tsz, tsz);
      }
    }

    ctx.fillStyle = `rgba(${p.color.r},${p.color.g},${p.color.b},${alpha})`;
    const pxSz = Math.max(PIXEL_SIZE, Math.ceil(sz / PIXEL_SIZE) * PIXEL_SIZE);
    ctx.fillRect(snapX, snapY, pxSz, pxSz);
  }
}

// ============================================================
// VELOCITY LOOKUP (particle-based + gravity)
// ============================================================
let currentTime = 0;

function getVelocityAt(sx, sy) {
  const ox = Math.floor((W - COLS * PIXEL_SIZE) / 2);
  const oy = Math.floor((H - ROWS * PIXEL_SIZE) / 2);

  const zoneLeft   = ox;
  const zoneRight  = ox + COLS * PIXEL_SIZE;
  const zoneTop    = oy;
  const zoneBottom = oy + ROWS * PIXEL_SIZE;

  if (sx < zoneLeft || sx > zoneRight || sy < zoneTop || sy > zoneBottom) {
    return { vx: 0, vy: 0, inZone: false };
  }

  let totalVx = 0, totalVy = 0, weight = 0;
  const radius = 20 * PIXEL_SIZE;

  for (let p of particles) {
    const dist = Math.sqrt((p.x - sx) ** 2 + (p.y - sy) ** 2);
    if (dist < radius) {
      const w = (1 - dist / radius) * p.life;
      totalVx += p.vx * w;
      totalVy += p.vy * w;
      weight += w;
    }
  }

  // Gravitational pull toward planet
  const planetSx = ox + PLANET_CX * PIXEL_SIZE;
  const planetSy = oy + PLANET_CY * PIXEL_SIZE;
  const planetSr = PLANET_R * PIXEL_SIZE;
  const pdx = planetSx - sx;
  const pdy = planetSy - sy;
  const pdist = Math.sqrt(pdx * pdx + pdy * pdy);
  let gravVx = 0, gravVy = 0;

  if (pdist > planetSr && pdist < planetSr * 8) {
    const gravStrength = 3.0 / (pdist / PIXEL_SIZE);
    gravVx = (pdx / pdist) * gravStrength;
    gravVy = (pdy / pdist) * gravStrength;
  }

  // Gravitational pull toward dying star
  const starSx = ox + DYING_STAR_CX * PIXEL_SIZE;
  const starSy = oy + DYING_STAR_CY * PIXEL_SIZE;
  const starSr = DYING_STAR_R * PIXEL_SIZE;
  const sdx = starSx - sx;
  const sdy = starSy - sy;
  const sdist = Math.sqrt(sdx * sdx + sdy * sdy);

  if (sdist > starSr && sdist < starSr * 10) {
    const gravStrength = 4.0 / (sdist / PIXEL_SIZE);
    gravVx += (sdx / sdist) * gravStrength;
    gravVy += (sdy / sdist) * gravStrength;
  }

  if (weight > 0.01) {
    return {
      vx: (totalVx / weight) * PIXEL_SIZE + gravVx * PIXEL_SIZE,
      vy: (totalVy / weight) * PIXEL_SIZE + gravVy * PIXEL_SIZE,
      inZone: true,
    };
  }

  return {
    vx: 0.15 * PIXEL_SIZE * windIntensity + gravVx * PIXEL_SIZE,
    vy: 0.1 * PIXEL_SIZE * windIntensity + gravVy * PIXEL_SIZE,
    inZone: true,
  };
}

// ============================================================
// PSEUDO-HAPTIC CURSOR
// ============================================================
let mouseX = 0, mouseY = 0;
let prevMouseX = 0, prevMouseY = 0;
let mouseInited = false;
let cursorX = 0, cursorY = 0;
let gain = 0.3;
let effectEnabled = true;
let showTrail = false;
let showDispLine = true;
let showFlowField = false;
let cursorTrail = [];

document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  if (!mouseInited) {
    prevMouseX = mouseX;
    prevMouseY = mouseY;
    cursorX = mouseX;
    cursorY = mouseY;
    mouseInited = true;
  }
});

function updateCursor(dt, time) {
  const dmx = mouseX - prevMouseX;
  const dmy = mouseY - prevMouseY;
  prevMouseX = mouseX;
  prevMouseY = mouseY;

  if (!effectEnabled) {
    cursorX = mouseX;
    cursorY = mouseY;
    return;
  }

  const v = getVelocityAt(cursorX, cursorY);

  if (v.inZone) {
    cursorX += dmx + v.vx * gain * dt * 30;
    cursorY += dmy + v.vy * gain * dt * 30;
  } else {
    cursorX += dmx;
    cursorY += dmy;
  }

  if (showTrail) {
    cursorTrail.push({ x: cursorX, y: cursorY, t: 1.0 });
    if (cursorTrail.length > 30) cursorTrail.shift();
  }
}

function drawCursorTrail() {
  if (!showTrail) return;
  for (let i = 0; i < cursorTrail.length; i++) {
    const p = cursorTrail[i];
    p.t -= 0.03;
    if (p.t <= 0) { cursorTrail.splice(i, 1); i--; continue; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3 * p.t, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(136,102,170,${p.t * 0.4})`;
    ctx.fill();
  }
}

// ============================================================
// DISPLACEMENT VISUALIZATION
// ============================================================
function drawDisplacementLine() {
  const dx = cursorX - mouseX;
  const dy = cursorY - mouseY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist > 1 && effectEnabled && showDispLine) {
    ctx.beginPath();
    ctx.moveTo(mouseX, mouseY);
    ctx.lineTo(cursorX, cursorY);
    ctx.strokeStyle = 'rgba(136,68,68,0.35)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.beginPath();
    ctx.arc(mouseX, mouseY, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(136,68,68,0.4)';
    ctx.fill();
  }

  document.getElementById('disp-value').textContent = dist.toFixed(1) + ' px';
}

// ============================================================
// VELOCITY FIELD VISUALIZATION
// ============================================================
function drawVelocityField() {
  if (!showFlowField) return;

  const ox = Math.floor((W - COLS * PIXEL_SIZE) / 2);
  const oy = Math.floor((H - ROWS * PIXEL_SIZE) / 2);
  const zoneLeft   = ox;
  const zoneRight  = ox + COLS * PIXEL_SIZE;
  const zoneTop    = oy;
  const zoneBottom = oy + ROWS * PIXEL_SIZE;

  const step = 5 * PIXEL_SIZE;
  const arrowScale = 8;
  const maxArrowLen = step * 0.9;

  ctx.save();
  for (let y = zoneTop + step; y <= zoneBottom - step; y += step) {
    for (let x = zoneLeft + step; x <= zoneRight - step; x += step) {
      const v = getVelocityAt(x, y);
      if (!v.inZone) continue;

      const mag = Math.sqrt(v.vx * v.vx + v.vy * v.vy);
      if (mag < 0.01) continue;

      let len = mag * arrowScale;
      if (len > maxArrowLen) len = maxArrowLen;

      const nx = v.vx / mag;
      const ny = v.vy / mag;

      const tx = x + nx * len;
      const ty = y + ny * len;

      const normMag = Math.min(mag / (3 * PIXEL_SIZE), 1);
      const hue = 270 - normMag * 60;
      const alpha = 0.3 + normMag * 0.3;

      ctx.strokeStyle = `hsla(${hue}, 50%, 40%, ${alpha})`;
      ctx.fillStyle = ctx.strokeStyle;
      ctx.lineWidth = 1.5;

      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(tx, ty);
      ctx.stroke();

      const headLen = Math.max(3, len * 0.3);
      const angle = Math.atan2(ny, nx);
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx - headLen * Math.cos(angle - 0.4), ty - headLen * Math.sin(angle - 0.4));
      ctx.lineTo(tx - headLen * Math.cos(angle + 0.4), ty - headLen * Math.sin(angle + 0.4));
      ctx.closePath();
      ctx.fill();
    }
  }
  ctx.restore();
}

// ============================================================
// ANIMATED STAR TWINKLE OVERLAY — very few, very dim
// ============================================================
function drawAnimatedStars(time) {
  const ox = Math.floor((W - COLS * PIXEL_SIZE) / 2);
  const oy = Math.floor((H - ROWS * PIXEL_SIZE) / 2);

  // Only 10 faint twinkling stars (was 30)
  _seed = 99999;
  for (let i = 0; i < 10; i++) {
    const sx = Math.floor(seededRandom() * COLS);
    const sy = Math.floor(seededRandom() * ROWS);
    const pdx = sx - PLANET_CX;
    const pdy = sy - PLANET_CY;
    if (Math.sqrt(pdx * pdx + pdy * pdy) < PLANET_R + 3) continue;
    const ddx = sx - DYING_STAR_CX;
    const ddy = sy - DYING_STAR_CY;
    if (Math.sqrt(ddx * ddx + ddy * ddy) < DYING_STAR_R + 3) continue;

    const phase = seededRandom() * Math.PI * 2;
    const freq = 0.3 + seededRandom() * 0.8;  // Slower
    const twinkle = 0.5 + 0.5 * Math.sin(time * freq + phase);
    const alpha = twinkle * 0.2;  // Much dimmer

    if (alpha > 0.05) {
      ctx.fillStyle = `rgba(140,140,160,${alpha})`;
      ctx.fillRect(ox + sx * PIXEL_SIZE, oy + sy * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
    }
  }
}

  showFlowField = this.checked;
});

// ============================================================
// MAIN LOOP
// ============================================================
let lastTime = 0;

function loop(timestamp) {
  const time = timestamp / 1000;
  const dt = Math.min(time - lastTime, 0.05);
  lastTime = time;

  ctx.clearRect(0, 0, W, H);

  // Fill entire canvas with void black first
  ctx.fillStyle = '#020204';
  ctx.fillRect(0, 0, W, H);

  ctx.drawImage(sceneCanvas, 0, 0);

  currentTime = time;
  drawAnimatedStars(time);
  drawAnimatedElements(time);
  updateParticles(dt, time);
  drawParticles(time);
  drawVignette();
  drawVelocityField();
  updateCursor(dt, time);
  drawDisplacementLine();
  drawCursorTrail();

  cursorEl.style.left = (cursorX - 2) + 'px';
  cursorEl.style.top = (cursorY - 2) + 'px';

  requestAnimationFrame(loop);
}

window.addEventListener('resize', () => {
  resize();
  buildScene();
  initParticles();
});

buildScene();
requestAnimationFrame(loop);
</script>
